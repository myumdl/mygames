<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  touch-action: none;
  user-select: none;
}
.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
  width: min(90vw, 420px);
}
.header h1 {
  font-size: 48px;
  font-weight: 800;
  color: #e2b714;
  flex-shrink: 0;
}
.scores {
  display: flex;
  gap: 10px;
  margin-left: auto;
}
.score-box {
  background: #16213e;
  border-radius: 8px;
  padding: 8px 16px;
  text-align: center;
  min-width: 70px;
}
.score-box .label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.score-box .value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
  width: min(90vw, 420px);
}
.btn {
  background: #16213e;
  color: #aaa;
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a2a50; color: #fff; }
.board {
  position: relative;
  width: min(90vw, 420px);
  height: min(90vw, 420px);
  background: #16213e;
  border-radius: 12px;
  padding: 8px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  width: 100%;
  height: 100%;
}
.cell {
  background: #0f3460;
  border-radius: 8px;
}
.tiles {
  position: absolute;
  inset: 8px;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  border-radius: 8px;
  transition: top 0.12s ease, left 0.12s ease;
  z-index: 1;
}
.tile.new {
  animation: pop 0.2s ease;
}
.tile.merged {
  animation: merge 0.2s ease;
  z-index: 2;
}
@keyframes pop {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes merge {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(26,26,46,0.85);
  border-radius: 12px;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay.active { display: flex; }
.overlay h2 {
  font-size: 36px;
  margin-bottom: 16px;
}
.overlay .btn {
  font-size: 18px;
  padding: 12px 32px;
  background: #e2b714;
  color: #1a1a2e;
  font-weight: 700;
}
.overlay .btn:hover { background: #f0c830; }
.footer {
  margin-top: 20px;
  font-size: 14px;
}
.footer a {
  color: #e2b714;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

/* tile colors */
.t2    { background:#1e3a5f; color:#a8d8ea; }
.t4    { background:#1e4d6e; color:#a8d8ea; }
.t8    { background:#e2703a; color:#fff; }
.t16   { background:#d44a27; color:#fff; }
.t32   { background:#c0392b; color:#fff; }
.t64   { background:#e74c3c; color:#fff; }
.t128  { background:#e2b714; color:#fff; }
.t256  { background:#d4a20e; color:#fff; }
.t512  { background:#c69408; color:#fff; }
.t1024 { background:#b88602; color:#fff; font-size:inherit; }
.t2048 { background:#aa7800; color:#fff; }
.tsuper{ background:#6c3483; color:#fff; }
</style>
</head>
<body>

<div class="header">
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box">
      <div class="label">分数</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">最高</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="game.restart()">新游戏</button>
</div>
<div class="board" id="board">
  <div class="grid" id="grid"></div>
  <div class="tiles" id="tiles"></div>
  <div class="overlay" id="overlay">
    <h2 id="overlayMsg">游戏结束</h2>
    <button class="btn" onclick="game.restart()">再来一局</button>
  </div>
</div>
<div class="footer">
  <a href="../index.html">← 返回大厅</a>
</div>

<script>
const SIZE = 4;

class Game {
  constructor() {
    this.best = parseInt(localStorage.getItem('2048_best') || '0');
    document.getElementById('best').textContent = this.best;
    this.buildGrid();
    this.bindEvents();
    this.restart();
  }

  buildGrid() {
    const grid = document.getElementById('grid');
    for (let i = 0; i < SIZE * SIZE; i++) {
      grid.appendChild(document.createElement('div')).className = 'cell';
    }
  }

  restart() {
    this.grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    this.score = 0;
    this.won = false;
    this.over = false;
    document.getElementById('score').textContent = '0';
    document.getElementById('overlay').classList.remove('active');
    this.addRandom();
    this.addRandom();
    this.render();
  }

  addRandom() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (this.grid[r][c] === 0) empty.push([r, c]);
    if (!empty.length) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    this.grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    this.newTile = [r, c];
  }

  move(dir) {
    if (this.over) return;
    const prev = this.grid.map(r => [...r]);
    this.mergedCells = [];

    // 0=up 1=right 2=down 3=left
    const horizontal = dir === 1 || dir === 3;
    const reverse = dir === 1 || dir === 2;

    for (let i = 0; i < SIZE; i++) {
      let line = [];
      for (let j = 0; j < SIZE; j++) {
        const r = horizontal ? i : j;
        const c = horizontal ? j : i;
        line.push(this.grid[r][c]);
      }
      if (reverse) line.reverse();

      // compress
      let compressed = line.filter(v => v !== 0);
      let merged = [];
      let skip = false;
      for (let k = 0; k < compressed.length; k++) {
        if (skip) { skip = false; continue; }
        if (k + 1 < compressed.length && compressed[k] === compressed[k + 1]) {
          const val = compressed[k] * 2;
          merged.push(val);
          this.score += val;
          if (val === 2048 && !this.won) this.won = true;
          const pos = merged.length - 1;
          skip = true;
          // record merge position
          const idx = reverse ? SIZE - 1 - pos : pos;
          const mr = horizontal ? i : idx;
          const mc = horizontal ? idx : i;
          this.mergedCells.push([mr, mc]);
        } else {
          merged.push(compressed[k]);
        }
      }
      while (merged.length < SIZE) merged.push(0);
      if (reverse) merged.reverse();

      for (let j = 0; j < SIZE; j++) {
        const r = horizontal ? i : j;
        const c = horizontal ? j : i;
        this.grid[r][c] = merged[j];
      }
    }

    const changed = !this.grid.every((row, r) => row.every((v, c) => v === prev[r][c]));
    if (!changed) return;

    this.newTile = null;
    this.addRandom();
    this.render();
    this.updateScore();

    if (!this.canMove()) {
      this.over = true;
      setTimeout(() => {
        document.getElementById('overlayMsg').textContent = '游戏结束!';
        document.getElementById('overlay').classList.add('active');
      }, 300);
    }
  }

  canMove() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        if (this.grid[r][c] === 0) return true;
        if (c + 1 < SIZE && this.grid[r][c] === this.grid[r][c + 1]) return true;
        if (r + 1 < SIZE && this.grid[r][c] === this.grid[r + 1][c]) return true;
      }
    return false;
  }

  updateScore() {
    document.getElementById('score').textContent = this.score;
    if (this.score > this.best) {
      this.best = this.score;
      localStorage.setItem('2048_best', this.best);
      document.getElementById('best').textContent = this.best;
    }
  }

  render() {
    const container = document.getElementById('tiles');
    container.innerHTML = '';
    const cellSize = container.offsetWidth / SIZE;

    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        const val = this.grid[r][c];
        if (val === 0) continue;

        const tile = document.createElement('div');
        tile.className = 'tile';

        // color class
        if (val <= 2048) tile.classList.add('t' + val);
        else tile.classList.add('tsuper');

        // animations
        if (this.newTile && this.newTile[0] === r && this.newTile[1] === c) {
          tile.classList.add('new');
        }
        if (this.mergedCells && this.mergedCells.some(p => p[0] === r && p[1] === c)) {
          tile.classList.add('merged');
        }

        const fontSize = val >= 1024 ? cellSize * 0.28 : val >= 128 ? cellSize * 0.35 : cellSize * 0.42;
        tile.style.cssText = `
          width:${cellSize - 8}px; height:${cellSize - 8}px;
          top:${r * cellSize + 4}px; left:${c * cellSize + 4}px;
          font-size:${fontSize}px;
        `;
        tile.textContent = val;
        container.appendChild(tile);
      }
  }

  bindEvents() {
    // keyboard
    document.addEventListener('keydown', e => {
      const map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3 };
      if (map[e.key] !== undefined) {
        e.preventDefault();
        this.move(map[e.key]);
      }
    });

    // touch/swipe
    const board = document.getElementById('board');
    let sx, sy;
    board.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
    }, { passive: true });
    board.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      if (Math.max(adx, ady) < 30) return;
      if (adx > ady) this.move(dx > 0 ? 1 : 3);
      else this.move(dy > 0 ? 2 : 0);
    }, { passive: true });

    // resize
    window.addEventListener('resize', () => this.render());
  }
}

const game = new Game();
</script>
</body>
</html>
