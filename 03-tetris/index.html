<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄罗斯方块</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  touch-action: none;
  user-select: none;
}
h1 { font-size: 36px; font-weight: 800; color: #e2b714; margin-bottom: 12px; }
.game-wrap {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.side {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 100px;
}
.panel {
  background: #16213e;
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.panel .label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.panel .value {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
}
canvas#main {
  border-radius: 10px;
  background: #0a0a1a;
}
canvas#preview {
  display: block;
  margin: 0 auto;
}
.controls {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  background: #16213e;
  color: #aaa;
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a2a50; color: #fff; }
/* mobile d-pad */
.dpad {
  display: none;
  margin-top: 14px;
  position: relative;
  width: 160px;
  height: 160px;
}
.dpad button {
  position: absolute;
  width: 52px;
  height: 52px;
  background: #16213e;
  border: 1px solid #2a3a5e;
  border-radius: 10px;
  color: #aaa;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dpad button:active { background: #2a3a5e; color: #fff; }
.dpad .up    { top: 0; left: 54px; }
.dpad .down  { bottom: 0; left: 54px; }
.dpad .left  { top: 54px; left: 0; }
.dpad .right { top: 54px; right: 0; }
.dpad .drop  { top: 54px; left: 54px; font-size: 13px; }
@media (max-width: 500px) {
  .dpad { display: block; }
  .game-wrap { flex-direction: column; align-items: center; }
  .side { flex-direction: row; }
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,26,0.88);
  border-radius: 10px;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
.overlay.active { display: flex; }
.overlay h2 { font-size: 28px; margin-bottom: 8px; color: #e2b714; }
.overlay p { color: #aaa; margin-bottom: 16px; font-size: 16px; }
.overlay .btn { background: #e2b714; color: #1a1a2e; font-weight: 700; font-size: 16px; }
.overlay .btn:hover { background: #f0c830; }
.board-wrap { position: relative; }
.footer { margin-top: 18px; font-size: 14px; }
.footer a { color: #e2b714; text-decoration: none; }
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>俄罗斯方块</h1>
<div class="game-wrap">
  <div class="board-wrap">
    <canvas id="main"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overMsg">游戏结束</h2>
      <p id="overScore"></p>
      <button class="btn" onclick="game.start()">再来一局</button>
    </div>
  </div>
  <div class="side">
    <div class="panel">
      <div class="label">分数</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="panel">
      <div class="label">消行</div>
      <div class="value" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="label">等级</div>
      <div class="value" id="level">1</div>
    </div>
    <div class="panel">
      <div class="label">下一个</div>
      <canvas id="preview" width="100" height="80"></canvas>
    </div>
  </div>
</div>
<div class="controls">
  <button class="btn" onclick="game.start()">新游戏</button>
  <button class="btn" id="pauseBtn" onclick="game.togglePause()">暂停</button>
</div>
<div class="dpad">
  <button class="up" ontouchstart="game.rotate()" onclick="game.rotate()">&#8593;</button>
  <button class="left" ontouchstart="game.moveH(-1)" onclick="game.moveH(-1)">&#8592;</button>
  <button class="right" ontouchstart="game.moveH(1)" onclick="game.moveH(1)">&#8594;</button>
  <button class="down" ontouchstart="game.softDrop()" onclick="game.softDrop()">&#8595;</button>
  <button class="drop" ontouchstart="game.hardDrop()" onclick="game.hardDrop()">Drop</button>
</div>
<div class="footer">
  <a href="../index.html">&larr; 返回大厅</a>
</div>

<script>
const COLS = 10, ROWS = 20, BS = 28;
const COLORS = ['#00000000','#00d4ff','#e2b714','#a855f7','#22c55e','#ef4444','#f97316','#3b82f6'];

const SHAPES = [
  [[1,1,1,1]],                         // I
  [[1,1],[1,1]],                        // O
  [[0,1,0],[1,1,1]],                    // T
  [[1,0,0],[1,1,1]],                    // J (was L shape visually, labeled J)
  [[0,0,1],[1,1,1]],                    // L
  [[0,1,1],[1,1,0]],                    // S
  [[1,1,0],[0,1,1]],                    // Z
];

class Tetris {
  constructor() {
    this.mainCanvas = document.getElementById('main');
    this.mainCtx = this.mainCanvas.getContext('2d');
    this.preCanvas = document.getElementById('preview');
    this.preCtx = this.preCanvas.getContext('2d');
    this.mainCanvas.width = COLS * BS;
    this.mainCanvas.height = ROWS * BS;
    this.bindKeys();
    this.start();
  }

  start() {
    this.board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    this.score = 0;
    this.linesCleared = 0;
    this.level = 1;
    this.paused = false;
    this.over = false;
    this.bag = [];
    document.getElementById('pauseBtn').textContent = '暂停';
    document.getElementById('overlay').classList.remove('active');
    this.next = this.randomPiece();
    this.spawn();
    this.updateUI();
    if (this.timer) cancelAnimationFrame(this.timer);
    this.lastDrop = performance.now();
    this.loop();
  }

  get dropInterval() { return Math.max(100, 800 - (this.level - 1) * 70); }

  randomPiece() {
    if (this.bag.length === 0) {
      this.bag = [0,1,2,3,4,5,6];
      for (let i = this.bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [this.bag[i], this.bag[j]] = [this.bag[j], this.bag[i]];
      }
    }
    const idx = this.bag.pop();
    return { shape: SHAPES[idx].map(r => [...r]), color: idx + 1 };
  }

  spawn() {
    this.current = this.next;
    this.next = this.randomPiece();
    this.cx = Math.floor((COLS - this.current.shape[0].length) / 2);
    this.cy = 0;
    if (this.collides(this.cx, this.cy, this.current.shape)) {
      this.gameOver();
    }
    this.drawPreview();
  }

  collides(x, y, shape) {
    for (let r = 0; r < shape.length; r++)
      for (let c = 0; c < shape[r].length; c++) {
        if (!shape[r][c]) continue;
        const nx = x + c, ny = y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && this.board[ny][nx]) return true;
      }
    return false;
  }

  lock() {
    const s = this.current.shape;
    for (let r = 0; r < s.length; r++)
      for (let c = 0; c < s[r].length; c++) {
        if (!s[r][c]) continue;
        const ny = this.cy + r;
        if (ny < 0) { this.gameOver(); return; }
        this.board[ny][this.cx + c] = this.current.color;
      }
    this.clearLines();
    this.spawn();
  }

  clearLines() {
    let cleared = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (this.board[r].every(v => v !== 0)) {
        this.board.splice(r, 1);
        this.board.unshift(Array(COLS).fill(0));
        cleared++;
        r++; // recheck same row
      }
    }
    if (cleared > 0) {
      const pts = [0, 100, 300, 500, 800];
      this.score += (pts[cleared] || 800) * this.level;
      this.linesCleared += cleared;
      this.level = Math.floor(this.linesCleared / 10) + 1;
      this.updateUI();
    }
  }

  rotate() {
    if (this.paused || this.over) return;
    const s = this.current.shape;
    const rows = s.length, cols = s[0].length;
    const rotated = Array.from({length: cols}, (_, c) =>
      Array.from({length: rows}, (_, r) => s[rows - 1 - r][c])
    );
    // wall kick offsets
    const kicks = [0, -1, 1, -2, 2];
    for (const off of kicks) {
      if (!this.collides(this.cx + off, this.cy, rotated)) {
        this.current.shape = rotated;
        this.cx += off;
        this.draw();
        return;
      }
    }
  }

  moveH(dir) {
    if (this.paused || this.over) return;
    if (!this.collides(this.cx + dir, this.cy, this.current.shape)) {
      this.cx += dir;
      this.draw();
    }
  }

  softDrop() {
    if (this.paused || this.over) return;
    if (!this.collides(this.cx, this.cy + 1, this.current.shape)) {
      this.cy++;
      this.score += 1;
      this.updateUI();
      this.draw();
    }
  }

  hardDrop() {
    if (this.paused || this.over) return;
    let drop = 0;
    while (!this.collides(this.cx, this.cy + 1, this.current.shape)) {
      this.cy++;
      drop++;
    }
    this.score += drop * 2;
    this.updateUI();
    this.lock();
    this.lastDrop = performance.now();
    this.draw();
  }

  togglePause() {
    if (this.over) return;
    this.paused = !this.paused;
    document.getElementById('pauseBtn').textContent = this.paused ? '继续' : '暂停';
    if (!this.paused) {
      this.lastDrop = performance.now();
      this.loop();
    }
  }

  gameOver() {
    this.over = true;
    document.getElementById('overScore').textContent = '得分: ' + this.score;
    document.getElementById('overlay').classList.add('active');
  }

  updateUI() {
    document.getElementById('score').textContent = this.score;
    document.getElementById('lines').textContent = this.linesCleared;
    document.getElementById('level').textContent = this.level;
  }

  // ===== Rendering =====
  ghostY() {
    let gy = this.cy;
    while (!this.collides(this.cx, gy + 1, this.current.shape)) gy++;
    return gy;
  }

  draw() {
    const ctx = this.mainCtx;
    const w = this.mainCanvas.width, h = this.mainCanvas.height;

    // background
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, w, h);

    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * BS); ctx.lineTo(w, r * BS); ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * BS, 0); ctx.lineTo(c * BS, h); ctx.stroke();
    }

    // locked blocks
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++) {
        if (this.board[r][c]) this.drawBlock(ctx, c, r, COLORS[this.board[r][c]], 1);
      }

    if (this.over || !this.current) return;

    // ghost
    const gy = this.ghostY();
    const s = this.current.shape;
    for (let r = 0; r < s.length; r++)
      for (let c = 0; c < s[r].length; c++) {
        if (s[r][c]) this.drawBlock(ctx, this.cx + c, gy + r, COLORS[this.current.color], 0.2);
      }

    // current piece
    for (let r = 0; r < s.length; r++)
      for (let c = 0; c < s[r].length; c++) {
        if (s[r][c]) this.drawBlock(ctx, this.cx + c, this.cy + r, COLORS[this.current.color], 1);
      }
  }

  drawBlock(ctx, x, y, color, alpha) {
    const pad = 1;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x * BS + pad, y * BS + pad, BS - pad * 2, BS - pad * 2, 4);
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(x * BS + pad + 2, y * BS + pad + 2, BS - pad * 2 - 4, 3);
    ctx.globalAlpha = 1;
  }

  drawPreview() {
    const ctx = this.preCtx;
    const cw = this.preCanvas.width, ch = this.preCanvas.height;
    ctx.clearRect(0, 0, cw, ch);

    const s = this.next.shape;
    const cols = s[0].length, rows = s.length;
    const bs = 20;
    const ox = (cw - cols * bs) / 2;
    const oy = (ch - rows * bs) / 2;

    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (!s[r][c]) continue;
        ctx.fillStyle = COLORS[this.next.color];
        ctx.beginPath();
        ctx.roundRect(ox + c * bs + 1, oy + r * bs + 1, bs - 2, bs - 2, 3);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(ox + c * bs + 3, oy + r * bs + 3, bs - 6, 2);
      }
  }

  // ===== Game loop =====
  loop() {
    if (this.paused || this.over) return;
    const now = performance.now();
    if (now - this.lastDrop >= this.dropInterval) {
      if (!this.collides(this.cx, this.cy + 1, this.current.shape)) {
        this.cy++;
      } else {
        this.lock();
      }
      this.lastDrop = now;
    }
    this.draw();
    this.timer = requestAnimationFrame(() => this.loop());
  }

  // ===== Input =====
  bindKeys() {
    document.addEventListener('keydown', e => {
      if (this.over) return;
      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); this.moveH(-1); break;
        case 'ArrowRight': e.preventDefault(); this.moveH(1); break;
        case 'ArrowDown':  e.preventDefault(); this.softDrop(); break;
        case 'ArrowUp':    e.preventDefault(); this.rotate(); break;
        case ' ':          e.preventDefault(); this.hardDrop(); break;
        case 'p': case 'P': this.togglePause(); break;
      }
    });

    // swipe support
    let sx, sy, stime;
    const board = this.mainCanvas;
    board.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      stime = Date.now();
    }, { passive: true });
    board.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      const dt = Date.now() - stime;
      const adx = Math.abs(dx), ady = Math.abs(dy);
      if (adx < 15 && ady < 15 && dt < 300) {
        this.rotate();
        return;
      }
      if (adx > ady && adx > 30) {
        this.moveH(dx > 0 ? 1 : -1);
      } else if (ady > adx && ady > 30) {
        if (dy > 0) {
          if (dy > 100) this.hardDrop();
          else this.softDrop();
        }
      }
    }, { passive: true });
  }
}

const game = new Tetris();
</script>
</body>
</html>
