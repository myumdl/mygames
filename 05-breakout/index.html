<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>打砖块 - Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;overflow:hidden;display:flex;flex-direction:column;align-items:center;height:100vh;user-select:none;-webkit-user-select:none}
a{color:#7ec8e3;text-decoration:none;font-size:14px}
a:hover{text-decoration:underline}
#topBar{width:100%;max-width:none;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;font-size:14px;background:#16213e;border-bottom:2px solid #0f3460;min-height:48px}
#topBar .left{display:flex;gap:12px;align-items:center}
#topBar .right{display:flex;gap:12px;align-items:center}
#gameTitle{font-size:18px;font-weight:bold;background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#statsBar{width:100%;max-width:500px;display:flex;justify-content:space-around;align-items:center;padding:4px 12px;font-size:13px;color:#aac;background:rgba(255,255,255,.05)}
.stat{display:flex;align-items:center;gap:4px}
#canvasWrap{position:relative;margin-top:4px;flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
canvas{display:block;border-radius:8px;cursor:none}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,26,0.88);border-radius:8px;z-index:10}
.overlay.active{display:flex}
.overlay h2{font-size:28px;margin-bottom:8px}
.overlay .sub{font-size:16px;color:#aac;margin-bottom:20px}
.overlay button{padding:12px 36px;font-size:16px;border:none;border-radius:24px;cursor:pointer;margin:6px;color:#fff;font-weight:bold;transition:transform .15s}
.overlay button:hover{transform:scale(1.05)}
.btn-primary{background:linear-gradient(135deg,#4d96ff,#6bcb77)}
.btn-secondary{background:linear-gradient(135deg,#ff6b6b,#ffd93d)}
.lvl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0}
.lvl-btn{width:48px;height:48px;border-radius:12px;border:2px solid #335;background:#112;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lvl-btn:hover:not(:disabled){background:#224;border-color:#4d96ff}
.lvl-btn:disabled{opacity:.35;cursor:default}
.lvl-btn.cleared{border-color:#6bcb77;color:#6bcb77}
#soundBtn{background:none;border:1px solid rgba(255,255,255,.2);border-radius:50%;color:#aac;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#soundBtn:hover{border-color:#f44336;color:#fff}

/* === 常温科技 品牌样式 === */
.cw-brand-bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:rgba(22,33,62,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-top:1px solid rgba(15,52,96,0.5);font-size:11px;color:rgba(255,255,255,0.45);pointer-events:none}
.cw-brand-bar img{width:18px;height:18px;border-radius:50%;opacity:0.6}
.cw-brand-bar span{letter-spacing:0.5px}
.cw-brand-logo-top{width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:4px;flex-shrink:0}
</style>
</head>
<body>
<div id="topBar">
  <div class="left">
    <a href="../index.html"><img class="cw-brand-logo-top" src="../logo.png" alt="常温"> &larr; 返回大厅</a>
    <span id="gameTitle">打砖块</span>
  </div>
  <div class="right">
    <button id="soundBtn" onclick="toggleSound()">🔊 音效</button>
  </div>
</div>
<div id="statsBar">
  <span class="stat" id="sLives">❤️❤️❤️</span>
  <span class="stat">分数: <b id="sScore">0</b></span>
  <span class="stat">最高: <b id="sHigh">0</b></span>
  <span class="stat">第 <b id="sLevel">1</b> 关</span>
  <span class="stat" id="sCombo" style="color:#ffd93d;display:none">连击 x<b id="sComboN">1</b></span>
</div>
<div id="canvasWrap">
  <canvas id="gc"></canvas>
  <div class="overlay active" id="ovMenu">
    <h2>打砖块</h2>
    <div class="sub">选择关卡</div>
    <div class="lvl-grid" id="lvlGrid"></div>
    <div style="font-size:12px;color:#667;margin-top:12px">鼠标/触屏移动挡板 | 点击发球 | ESC暂停</div>
  </div>
  <div class="overlay" id="ovWin">
    <h2 id="winTitle">第1关 通过！</h2>
    <div class="sub" id="winSub">得分: 0</div>
    <button class="btn-primary" id="btnNext" onclick="nextLevel()">下一关</button>
    <button class="btn-secondary" onclick="showMenu()">返回选关</button>
  </div>
  <div class="overlay" id="ovLose">
    <h2>游戏结束</h2>
    <div class="sub" id="loseSub">最终得分: 0</div>
    <button class="btn-primary" onclick="retryLevel()">再来一局</button>
    <button class="btn-secondary" onclick="showMenu()">返回选关</button>
  </div>
  <div class="overlay" id="ovPause">
    <h2>暂停</h2>
    <div class="sub">按 ESC 或点击按钮继续</div>
    <button class="btn-primary" onclick="resumeGame()">继续游戏</button>
    <button class="btn-secondary" onclick="showMenu()">返回选关</button>
  </div>
</div>

<script>
(function(){
"use strict";

/* ============ CONSTANTS ============ */
const CW = 480, CH = 640;
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
canvas.width = CW; canvas.height = CH;

const BRICK_COLS = 10, BRICK_MAX_ROWS = 8;
const BRICK_PAD = 4;
const BRICK_OFFX = 9, BRICK_OFFY = 50;
const BRICK_W = (CW - 2 * BRICK_OFFX - (BRICK_COLS - 1) * BRICK_PAD) / BRICK_COLS;
const BRICK_H = 18;
const PADDLE_H = 14, PADDLE_BASE_W = 72, BALL_R = 6;
const POWERUP_W = 32, POWERUP_H = 15;

const B_NONE = 0, B_NORMAL = 1, B_HARD = 2, B_STEEL = 3, B_EXPLOSIVE = 4;
const PW_WIDE = 0, PW_MULTI = 1, PW_FIRE = 2, PW_SLOW = 3, PW_LIFE = 4;
const PW_COLORS = ['#4d96ff','#6bcb77','#ff6b6b','#ffd93d','#ff8ecd'];
const PW_LABELS = ['宽','多','火','慢','+'];
const ROW_COLORS = ['#ff6b6b','#ff9f43','#ffd93d','#6bcb77','#4d96ff','#a55eea','#ff6b9f','#5fd4f0'];
const BG_THEMES = ['#0a0a2e','#1a0a2e','#0a1a0e','#1a0a0a','#050510'];

const BASE_SPEED = 4.5;

/* ============ AUDIO ============ */
let soundOn = true;
let audioCtx = null;
function getAC(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function toggleSound(){ soundOn = !soundOn; document.getElementById('soundBtn').textContent = soundOn ? '🔊 音效' : '🔇 静音'; }

function playTone(freq, dur, type, vol){
  if(!soundOn) return;
  type = type || 'sine'; vol = vol || 0.12;
  try {
    const a = getAC(), o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq; g.gain.value = vol;
    o.connect(g); g.connect(a.destination);
    o.start(a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur / 1000);
    o.stop(a.currentTime + dur / 1000 + 0.02);
  } catch(e){}
}
function sndPaddle(){ playTone(500, 30, 'square', 0.1); }
function sndBrick(){ playTone(800, 25, 'square', 0.08); }
function sndCrack(){ playTone(600, 40, 'triangle', 0.1); }
function sndDestroy(){ playTone(1000, 50, 'sawtooth', 0.1); }
function sndExplosion(){
  if(!soundOn) return;
  try {
    const a = getAC(), len = Math.floor(a.sampleRate * 0.1);
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.025));
    const s = a.createBufferSource(); s.buffer = buf;
    const g = a.createGain(); g.gain.value = 0.25;
    s.connect(g); g.connect(a.destination); s.start();
  } catch(e){}
}
function sndPowerup(){ playTone(600, 60); setTimeout(function(){ playTone(800, 60); }, 70); setTimeout(function(){ playTone(1050, 80); }, 140); }
function sndLoseLife(){
  if(!soundOn) return;
  try {
    const a = getAC(), o = a.createOscillator(), g = a.createGain();
    o.type = 'sawtooth'; o.frequency.value = 300; g.gain.value = 0.12;
    o.connect(g); g.connect(a.destination);
    o.frequency.linearRampToValueAtTime(80, a.currentTime + 0.25);
    o.start(a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.3);
    o.stop(a.currentTime + 0.31);
  } catch(e){}
}
function sndVictory(){
  [523, 659, 784, 1047].forEach(function(f, i){ setTimeout(function(){ playTone(f, 150, 'square', 0.12); }, i * 120); });
}

/* ============ STORAGE ============ */
let highScore = parseInt(localStorage.getItem('game_breakout_highscore')) || 0;
let unlockedLevel = parseInt(localStorage.getItem('game_breakout_level')) || 1;
document.getElementById('sHigh').textContent = highScore;

/* ============ GAME STATE ============ */
let state = 'menu';
let currentLevel = 1;
let score = 0, lives = 3, combo = 0;
let paddleW = PADDLE_BASE_W, paddleX = CW / 2;
let balls = [], bricks = [], powerups = [], particles = [], stars = [];
let shakeTimer = 0, shakeX = 0, shakeY = 0;
let speedTimer = 0, speedMul = 1;
let pwTimers = { wide: 0, fire: 0, slow: 0 };
let launched = false;
let mouseX = CW / 2;
let touchActive = false;

/* ============ STARS ============ */
function initStars(){
  stars = [];
  for(let i = 0; i < 70; i++){
    stars.push({
      x: Math.random() * CW,
      y: Math.random() * CH,
      r: Math.random() * 1.3 + 0.3,
      base: Math.random() * 0.5 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005
    });
  }
}
initStars();

/* ============ LEVEL DEFINITIONS ============ */
function makeLevel(n){
  var g = [];
  var r, c, row;
  if(n === 1){
    // Simple rectangle
    for(r = 0; r < 5; r++){
      row = [];
      for(c = 0; c < BRICK_COLS; c++) row.push(B_NORMAL);
      g.push(row);
    }
  } else if(n === 2){
    // Diamond with hard bricks
    for(r = 0; r < 7; r++){
      row = [];
      for(c = 0; c < BRICK_COLS; c++){
        var cx = Math.abs(c - 4.5), ry = Math.abs(r - 3);
        if(cx + ry <= 4.5) row.push((cx + ry <= 2) ? B_HARD : B_NORMAL);
        else row.push(B_NONE);
      }
      g.push(row);
    }
  } else if(n === 3){
    // Corridors with steel walls
    for(r = 0; r < 7; r++){
      row = [];
      for(c = 0; c < BRICK_COLS; c++){
        if(c === 3 || c === 6) row.push(B_STEEL);
        else if(r === 0 || r === 6) row.push(B_HARD);
        else row.push(B_NORMAL);
      }
      g.push(row);
    }
  } else if(n === 4){
    // Checkerboard with explosives
    for(r = 0; r < 7; r++){
      row = [];
      for(c = 0; c < BRICK_COLS; c++){
        if((r + c) % 2 === 0){
          if((r === 2 || r === 4) && (c === 2 || c === 4 || c === 6 || c === 8)) row.push(B_EXPLOSIVE);
          else row.push(B_HARD);
        } else {
          row.push(B_NORMAL);
        }
      }
      g.push(row);
    }
  } else {
    // Fortress with steel border
    for(r = 0; r < 8; r++){
      row = [];
      for(c = 0; c < BRICK_COLS; c++){
        if(r === 0 || r === 7 || c === 0 || c === 9) row.push(B_STEEL);
        else if(r === 1 || r === 6) row.push(B_HARD);
        else if((r === 3 || r === 4) && (c === 3 || c === 6)) row.push(B_EXPLOSIVE);
        else if((r === 3 || r === 4) && c >= 3 && c <= 6) row.push(B_HARD);
        else row.push(B_NORMAL);
      }
      g.push(row);
    }
  }
  return g;
}

/* ============ INIT LEVEL ============ */
function initLevel(lvl){
  currentLevel = lvl;
  var layout = makeLevel(lvl);
  bricks = [];
  for(var r = 0; r < layout.length; r++){
    for(var c = 0; c < BRICK_COLS; c++){
      if(layout[r][c] !== B_NONE){
        bricks.push({
          x: BRICK_OFFX + c * (BRICK_W + BRICK_PAD),
          y: BRICK_OFFY + r * (BRICK_H + BRICK_PAD),
          w: BRICK_W, h: BRICK_H,
          type: layout[r][c],
          hp: layout[r][c] === B_HARD ? 2 : (layout[r][c] === B_STEEL ? 9999 : 1),
          row: r, col: c,
          cracked: false,
          alive: true
        });
      }
    }
  }
  balls = []; powerups = []; particles = [];
  paddleW = PADDLE_BASE_W;
  paddleX = CW / 2;
  speedMul = 1; speedTimer = 0; combo = 0;
  pwTimers = { wide: 0, fire: 0, slow: 0 };
  launched = false;
  resetBall();
  updateUI();
}

function resetBall(){
  balls = [makeBall(paddleX, CH - 40 - BALL_R)];
  launched = false;
}

function makeBall(x, y){
  return { x: x, y: y, vx: 0, vy: 0, trail: [] };
}

function launchBall(){
  if(launched || balls.length === 0) return;
  launched = true;
  var angle = -Math.PI / 2 + (Math.random() * 0.5 - 0.25);
  balls[0].vx = Math.cos(angle) * BASE_SPEED;
  balls[0].vy = Math.sin(angle) * BASE_SPEED;
}

/* ============ HELPERS ============ */
function darken(hex, amt){
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.floor(r*(1-amt)); g = Math.floor(g*(1-amt)); b = Math.floor(b*(1-amt));
  return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
}
function lighten(hex, amt){
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255,Math.floor(r+(255-r)*amt)); g = Math.min(255,Math.floor(g+(255-g)*amt)); b = Math.min(255,Math.floor(b+(255-b)*amt));
  return '#' + [r,g,b].map(function(v){ return v.toString(16).padStart(2,'0'); }).join('');
}

function brickColor(b){
  if(b.type === B_STEEL) return '#8899aa';
  if(b.type === B_EXPLOSIVE) return '#ff7b29';
  if(b.type === B_HARD) return darken(ROW_COLORS[b.row % ROW_COLORS.length], 0.3);
  return ROW_COLORS[b.row % ROW_COLORS.length];
}

/* ============ PARTICLES ============ */
function spawnParticles(x, y, color, count, force){
  for(var i = 0; i < count; i++){
    var ang = Math.random() * Math.PI * 2;
    var spd = Math.random() * force + 1;
    particles.push({
      x: x, y: y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 1.5,
      life: 1.0,
      color: color,
      size: Math.random() * 3 + 1.5
    });
  }
}

/* ============ BRICK DESTRUCTION ============ */
function destroyBrick(idx, fromExplosion){
  var b = bricks[idx];
  if(!b || !b.alive) return;
  var col = brickColor(b);

  if(b.type === B_EXPLOSIVE && !fromExplosion){
    sndExplosion();
    spawnParticles(b.x + b.w/2, b.y + b.h/2, '#ffaa33', 20, 5);
    shakeTimer = 14;
    var eRow = b.row, eCol = b.col;
    b.alive = false;
    score += 50 * Math.max(1, combo);
    // Destroy 3x3 area
    for(var i = 0; i < bricks.length; i++){
      var br = bricks[i];
      if(!br || !br.alive) continue;
      if(br.type === B_STEEL) continue;
      if(Math.abs(br.row - eRow) <= 1 && Math.abs(br.col - eCol) <= 1){
        destroyBrick(i, true);
      }
    }
  } else {
    spawnParticles(b.x + b.w/2, b.y + b.h/2, col, 7, 3);
    sndDestroy();
    var pts = (b.type === B_HARD) ? 20 : 10;
    score += pts * Math.max(1, combo);
    b.alive = false;
  }
  // Power-up drop (10% chance)
  if(Math.random() < 0.10){
    var pType = Math.floor(Math.random() * 5);
    powerups.push({
      x: b.x + b.w/2 - POWERUP_W/2,
      y: b.y + b.h,
      w: POWERUP_W, h: POWERUP_H,
      type: pType,
      vy: 1.5
    });
  }
}

function hitBrick(idx, ball){
  var b = bricks[idx];
  if(!b || !b.alive) return;
  if(b.type === B_STEEL){
    sndCrack();
    spawnParticles(b.x + b.w/2, b.y + b.h/2, '#8899aa', 3, 1.5);
    return;
  }
  b.hp--;
  combo++;
  updateCombo();
  if(b.hp <= 0){
    destroyBrick(idx, false);
  } else {
    b.cracked = true;
    sndCrack();
    spawnParticles(b.x + b.w/2, b.y + b.h/2, brickColor(b), 3, 2);
    score += 5 * Math.max(1, combo);
  }
}

/* ============ POWER-UPS ============ */
function applyPowerup(type){
  if(type === PW_WIDE){
    pwTimers.wide = 10;
    paddleW = PADDLE_BASE_W * 1.5;
  } else if(type === PW_MULTI){
    if(balls.length > 0 && launched){
      var ref = balls[0];
      var spd = Math.sqrt(ref.vx * ref.vx + ref.vy * ref.vy);
      var baseAng = Math.atan2(ref.vy, ref.vx);
      for(var i = 0; i < 2; i++){
        var ang = baseAng + (i === 0 ? 0.4 : -0.4);
        var nb = makeBall(ref.x, ref.y);
        nb.vx = Math.cos(ang) * spd;
        nb.vy = Math.sin(ang) * spd;
        nb.trail = [];
        balls.push(nb);
      }
    }
  } else if(type === PW_FIRE){
    pwTimers.fire = 8;
  } else if(type === PW_SLOW){
    pwTimers.slow = 8;
  } else if(type === PW_LIFE){
    lives = Math.min(lives + 1, 5);
  }
}

/* ============ UI ============ */
function updateUI(){
  var hearts = '';
  for(var i = 0; i < lives; i++) hearts += '❤️';
  document.getElementById('sLives').textContent = hearts || '💔';
  document.getElementById('sScore').textContent = score;
  document.getElementById('sLevel').textContent = currentLevel;
  if(score > highScore){
    highScore = score;
    localStorage.setItem('game_breakout_highscore', String(highScore));
  }
  document.getElementById('sHigh').textContent = highScore;
}

function updateCombo(){
  var el = document.getElementById('sCombo');
  var n = document.getElementById('sComboN');
  if(combo > 1){ el.style.display = 'inline-flex'; n.textContent = combo; }
  else { el.style.display = 'none'; }
}

/* ============ GAME FLOW ============ */
function levelComplete(){
  state = 'win';
  sndVictory();
  if(currentLevel >= unlockedLevel && currentLevel < 5){
    unlockedLevel = currentLevel + 1;
    localStorage.setItem('game_breakout_level', String(unlockedLevel));
  }
  document.getElementById('winTitle').textContent = '第' + currentLevel + '关 通过！';
  document.getElementById('winSub').textContent = '得分: ' + score;
  document.getElementById('btnNext').style.display = (currentLevel >= 5) ? 'none' : '';
  showOverlay('ovWin');
}

function gameOver(){
  state = 'lose';
  document.getElementById('loseSub').textContent = '最终得分: ' + score;
  showOverlay('ovLose');
}

/* ============ UPDATE ============ */
function update(dt){
  if(state !== 'playing') return;

  // Speed increase every 30s
  speedTimer += dt;
  if(speedTimer >= 30){
    speedTimer -= 30;
    speedMul = Math.min(1.5, speedMul + 0.05);
  }

  // Power-up timers
  for(var k in pwTimers){
    if(pwTimers[k] > 0){
      pwTimers[k] -= dt;
      if(pwTimers[k] <= 0){
        pwTimers[k] = 0;
        if(k === 'wide') paddleW = PADDLE_BASE_W;
      }
    }
  }

  // Paddle movement
  paddleX += (mouseX - paddleX) * 0.25;
  paddleX = Math.max(paddleW / 2, Math.min(CW - paddleW / 2, paddleX));

  // Ball on paddle before launch
  if(!launched && balls.length > 0){
    balls[0].x = paddleX;
    balls[0].y = CH - 40 - BALL_R;
    balls[0].vx = 0;
    balls[0].vy = 0;
  }

  // Actual speed multiplier
  var actualMul = speedMul * (pwTimers.slow > 0 ? 0.6 : 1.0);

  // Update balls
  for(var bi = balls.length - 1; bi >= 0; bi--){
    var ball = balls[bi];
    if(!launched) continue;

    // Trail
    ball.trail.push({ x: ball.x, y: ball.y });
    if(ball.trail.length > 5) ball.trail.shift();

    // Normalize speed
    var curSpd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if(curSpd > 0){
      ball.vx = (ball.vx / curSpd) * BASE_SPEED;
      ball.vy = (ball.vy / curSpd) * BASE_SPEED;
    }

    // Movement with substeps for better collision
    var steps = 3;
    var stepVx = ball.vx * actualMul / steps;
    var stepVy = ball.vy * actualMul / steps;

    for(var step = 0; step < steps; step++){
      ball.x += stepVx;
      ball.y += stepVy;

      // Wall collisions
      if(ball.x - BALL_R < 0){ ball.x = BALL_R; ball.vx = Math.abs(ball.vx); stepVx = Math.abs(stepVx); }
      if(ball.x + BALL_R > CW){ ball.x = CW - BALL_R; ball.vx = -Math.abs(ball.vx); stepVx = -Math.abs(stepVx); }
      if(ball.y - BALL_R < 0){ ball.y = BALL_R; ball.vy = Math.abs(ball.vy); stepVy = Math.abs(stepVy); }

      // Paddle collision
      var pLeft = paddleX - paddleW / 2;
      var pRight = paddleX + paddleW / 2;
      var pTop = CH - 40;

      if(ball.vy > 0 &&
         ball.y + BALL_R >= pTop &&
         ball.y - BALL_R <= pTop + PADDLE_H &&
         ball.x + BALL_R >= pLeft &&
         ball.x - BALL_R <= pRight){

        ball.y = pTop - BALL_R;
        var offset = (ball.x - paddleX) / (paddleW / 2);
        offset = Math.max(-1, Math.min(1, offset));
        var angle = -Math.PI / 2 + offset * (Math.PI / 3); // -60 to +60
        ball.vx = Math.cos(angle) * BASE_SPEED;
        ball.vy = Math.sin(angle) * BASE_SPEED;
        stepVx = ball.vx * actualMul / steps;
        stepVy = ball.vy * actualMul / steps;
        combo = 0;
        updateCombo();
        sndPaddle();
      }

      // Brick collisions
      var isFire = pwTimers.fire > 0;
      for(var i = 0; i < bricks.length; i++){
        var b = bricks[i];
        if(!b || !b.alive) continue;

        // AABB circle test
        var nearX = Math.max(b.x, Math.min(ball.x, b.x + b.w));
        var nearY = Math.max(b.y, Math.min(ball.y, b.y + b.h));
        var dx = ball.x - nearX;
        var dy = ball.y - nearY;
        if(dx * dx + dy * dy > BALL_R * BALL_R) continue;

        // Hit!
        hitBrick(i, ball);

        if(!isFire){
          // Determine bounce face
          var overlapL = (ball.x + BALL_R) - b.x;
          var overlapR = (b.x + b.w) - (ball.x - BALL_R);
          var overlapT = (ball.y + BALL_R) - b.y;
          var overlapB = (b.y + b.h) - (ball.y - BALL_R);

          var minOverlap = Math.min(overlapL, overlapR, overlapT, overlapB);

          if(minOverlap === overlapL){
            ball.x = b.x - BALL_R;
            ball.vx = -Math.abs(ball.vx);
          } else if(minOverlap === overlapR){
            ball.x = b.x + b.w + BALL_R;
            ball.vx = Math.abs(ball.vx);
          } else if(minOverlap === overlapT){
            ball.y = b.y - BALL_R;
            ball.vy = -Math.abs(ball.vy);
          } else {
            ball.y = b.y + b.h + BALL_R;
            ball.vy = Math.abs(ball.vy);
          }
          stepVx = ball.vx * actualMul / steps;
          stepVy = ball.vy * actualMul / steps;
          break; // one brick per substep
        }
        // Fire ball passes through
      }
    }

    // Ball lost below screen
    if(ball.y - BALL_R > CH + 10){
      balls.splice(bi, 1);
    }
  }

  // All balls lost
  if(launched && balls.length === 0){
    lives--;
    sndLoseLife();
    combo = 0; updateCombo();
    updateUI();
    if(lives <= 0){
      gameOver();
    } else {
      launched = false;
      paddleW = PADDLE_BASE_W;
      pwTimers = { wide: 0, fire: 0, slow: 0 };
      resetBall();
    }
  }

  // Power-ups falling
  for(var pi = powerups.length - 1; pi >= 0; pi--){
    var pu = powerups[pi];
    pu.y += pu.vy;
    // Catch with paddle
    var pl = paddleX - paddleW / 2;
    var pt = CH - 40;
    if(pu.y + pu.h >= pt && pu.y <= pt + PADDLE_H && pu.x + pu.w >= pl && pu.x <= pl + paddleW){
      applyPowerup(pu.type);
      powerups.splice(pi, 1);
      sndPowerup();
      continue;
    }
    if(pu.y > CH + 30) powerups.splice(pi, 1);
  }

  // Particles
  for(var qi = particles.length - 1; qi >= 0; qi--){
    var p = particles[qi];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.028;
    if(p.life <= 0) particles.splice(qi, 1);
  }

  // Screen shake
  if(shakeTimer > 0){
    shakeTimer--;
    shakeX = (Math.random() - 0.5) * 6;
    shakeY = (Math.random() - 0.5) * 6;
  } else {
    shakeX = 0; shakeY = 0;
  }

  // Check win: all breakable bricks gone
  var anyBreakable = false;
  for(var wi = 0; wi < bricks.length; wi++){
    if(bricks[wi] && bricks[wi].alive && bricks[wi].type !== B_STEEL){
      anyBreakable = true; break;
    }
  }
  if(!anyBreakable) levelComplete();

  updateUI();
}

/* ============ DRAW ============ */
function draw(){
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  var bg = BG_THEMES[(currentLevel - 1) % BG_THEMES.length];
  ctx.fillStyle = bg;
  ctx.fillRect(-10, -10, CW + 20, CH + 20);

  // Stars
  var now = Date.now();
  for(var si = 0; si < stars.length; si++){
    var s = stars[si];
    var alpha = s.base + Math.sin(now * s.speed + s.phase) * 0.25;
    alpha = Math.max(0.05, Math.min(0.9, alpha));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Bricks
  for(var di = 0; di < bricks.length; di++){
    var b = bricks[di];
    if(!b || !b.alive) continue;
    drawBrick(b);
  }

  // Power-ups
  for(var pi = 0; pi < powerups.length; pi++){
    drawPowerup(powerups[pi]);
  }

  // Paddle
  drawPaddle();

  // Balls
  for(var bi = 0; bi < balls.length; bi++){
    drawBall(balls[bi]);
  }

  // Particles
  for(var qi = 0; qi < particles.length; qi++){
    var p = particles[qi];
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Timer bars
  drawTimerBars();

  // Launch hint
  if(!launched && state === 'playing'){
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击发球', CW / 2, CH - 70);
  }

  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBrick(b){
  var col = brickColor(b);
  var x = b.x, y = b.y, w = b.w, h = b.h;

  roundRect(x, y, w, h, 3);
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, lighten(col, 0.25));
  grad.addColorStop(1, col);
  ctx.fillStyle = grad;
  ctx.fill();

  // Top highlight
  ctx.strokeStyle = lighten(col, 0.45);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 4, y + 1.5);
  ctx.lineTo(x + w - 4, y + 1.5);
  ctx.stroke();

  // Steel special drawing
  if(b.type === B_STEEL){
    ctx.fillStyle = '#bbc8d4';
    ctx.beginPath(); ctx.arc(x + 6, y + h / 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w - 6, y + h / 2, 2, 0, Math.PI * 2); ctx.fill();
    // Border
    roundRect(x, y, w, h, 3);
    ctx.strokeStyle = '#667788';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Cracked
  if(b.cracked){
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.3, y + 1);
    ctx.lineTo(x + w * 0.45, y + h * 0.45);
    ctx.lineTo(x + w * 0.35, y + h - 1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w * 0.45, y + h * 0.45);
    ctx.lineTo(x + w * 0.65, y + h * 0.3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w * 0.45, y + h * 0.45);
    ctx.lineTo(x + w * 0.6, y + h * 0.7);
    ctx.stroke();
  }

  // Explosive icon
  if(b.type === B_EXPLOSIVE){
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Starburst icon
    var cx = x + w / 2, cy = y + h / 2;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.2;
    for(var i = 0; i < 6; i++){
      var a = i * Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(a) * 6, cy + Math.sin(a) * 6);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffd93d';
    ctx.beginPath();
    ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPaddle(){
  var x = paddleX - paddleW / 2;
  var y = CH - 40;
  var w = paddleW;
  var h = PADDLE_H;
  var r = h / 2;

  // Glow
  var glowColor = pwTimers.fire > 0 ? '#ff4444' : (pwTimers.wide > 0 ? '#4d96ff' : '#6688bb');
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 15;

  roundRect(x, y, w, h, r);
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, '#d0e0f8');
  grad.addColorStop(0.4, '#90b8e8');
  grad.addColorStop(1, '#5888bb');
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle inner line
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + r, y + 2);
  ctx.lineTo(x + w - r, y + 2);
  ctx.stroke();
}

function drawBall(ball){
  var isF = pwTimers.fire > 0;
  var bColor = isF ? '#ff6644' : '#ffffff';
  var glowCol = isF ? '#ff4400' : '#aaccff';

  // Trail
  for(var i = 0; i < ball.trail.length; i++){
    var t = ball.trail[i];
    var a = (i + 1) / (ball.trail.length + 1) * 0.35;
    var rr = BALL_R * (i + 1) / (ball.trail.length + 1) * 0.8;
    ctx.globalAlpha = a;
    ctx.fillStyle = bColor;
    ctx.beginPath();
    ctx.arc(t.x, t.y, rr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Glow
  ctx.shadowColor = glowCol;
  ctx.shadowBlur = 12;

  ctx.fillStyle = bColor;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // Inner bright spot
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(ball.x - 1.5, ball.y - 1.5, BALL_R * 0.35, 0, Math.PI * 2);
  ctx.fill();
}

function drawPowerup(pu){
  var col = PW_COLORS[pu.type];
  var x = pu.x, y = pu.y, w = pu.w, h = pu.h;
  var r = h / 2;

  ctx.shadowColor = col;
  ctx.shadowBlur = 8;

  roundRect(x, y, w, h, r);
  var grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, lighten(col, 0.3));
  grad.addColorStop(1, col);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(PW_LABELS[pu.type], x + w / 2, y + h / 2 + 1);
}

function drawTimerBars(){
  var y = CH - 20;
  var timers = [
    { key: 'wide', label: '宽挡板', color: '#4d96ff', max: 10 },
    { key: 'fire', label: '火焰球', color: '#ff6b6b', max: 8 },
    { key: 'slow', label: '减速', color: '#ffd93d', max: 8 }
  ];
  for(var i = 0; i < timers.length; i++){
    var t = timers[i];
    if(pwTimers[t.key] > 0){
      var barW = 60, barH = 6;
      var bx = CW - barW - 10;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(bx, y, barW, barH);
      var frac = pwTimers[t.key] / t.max;
      ctx.fillStyle = t.color;
      ctx.fillRect(bx, y, barW * frac, barH);
      ctx.fillStyle = '#ccc';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(t.label + ' ' + Math.ceil(pwTimers[t.key]) + 's', bx - 4, y + barH);
      y -= 16;
    }
  }
}

/* ============ OVERLAYS ============ */
function showOverlay(id){
  var ids = ['ovMenu','ovWin','ovLose','ovPause'];
  for(var i = 0; i < ids.length; i++){
    var el = document.getElementById(ids[i]);
    if(ids[i] === id) el.classList.add('active');
    else el.classList.remove('active');
  }
}
function hideOverlays(){
  var ids = ['ovMenu','ovWin','ovLose','ovPause'];
  for(var i = 0; i < ids.length; i++){
    document.getElementById(ids[i]).classList.remove('active');
  }
}

/* ============ PUBLIC FUNCTIONS (called from HTML) ============ */
window.toggleSound = toggleSound;

window.showMenu = function(){
  state = 'menu';
  buildLevelGrid();
  showOverlay('ovMenu');
};

window.nextLevel = function(){
  if(currentLevel < 5){
    initLevel(currentLevel + 1);
    state = 'playing';
    hideOverlays();
  }
};

window.retryLevel = function(){
  score = 0; lives = 3;
  initLevel(currentLevel);
  state = 'playing';
  hideOverlays();
};

window.resumeGame = function(){
  state = 'playing';
  hideOverlays();
};

function buildLevelGrid(){
  var grid = document.getElementById('lvlGrid');
  grid.innerHTML = '';
  for(var i = 1; i <= 5; i++){
    var btn = document.createElement('button');
    btn.className = 'lvl-btn';
    if(i > unlockedLevel) btn.disabled = true;
    if(i < unlockedLevel) btn.classList.add('cleared');
    btn.textContent = String(i);
    (function(lvl){
      btn.onclick = function(){
        score = 0; lives = 3;
        initLevel(lvl);
        state = 'playing';
        hideOverlays();
      };
    })(i);
    grid.appendChild(btn);
  }
}

/* ============ INPUT ============ */
canvas.addEventListener('mousemove', function(e){
  var rect = canvas.getBoundingClientRect();
  var scaleX = CW / rect.width;
  mouseX = (e.clientX - rect.left) * scaleX;
});

canvas.addEventListener('click', function(e){
  if(state === 'playing' && !launched){
    try { getAC(); } catch(e){}
    launchBall();
  }
});

canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  touchActive = true;
  var rect = canvas.getBoundingClientRect();
  var scaleX = CW / rect.width;
  mouseX = (e.touches[0].clientX - rect.left) * scaleX;
  if(state === 'playing' && !launched){
    try { getAC(); } catch(e2){}
    launchBall();
  }
}, { passive: false });

canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  if(e.touches.length > 0){
    var rect = canvas.getBoundingClientRect();
    var scaleX = CW / rect.width;
    mouseX = (e.touches[0].clientX - rect.left) * scaleX;
  }
}, { passive: false });

canvas.addEventListener('touchend', function(e){
  e.preventDefault();
  touchActive = false;
}, { passive: false });

var keysDown = {};
document.addEventListener('keydown', function(e){
  keysDown[e.key] = true;
  if(e.key === 'Escape'){
    e.preventDefault();
    if(state === 'playing'){ state = 'paused'; showOverlay('ovPause'); }
    else if(state === 'paused'){ state = 'playing'; hideOverlays(); }
  }
  if((e.key === ' ' || e.key === 'Enter') && state === 'playing' && !launched){
    e.preventDefault();
    try { getAC(); } catch(e2){}
    launchBall();
  }
});
document.addEventListener('keyup', function(e){ keysDown[e.key] = false; });

/* ============ GAME LOOP ============ */
var lastTime = 0;
var accumulator = 0;
var TICK = 1 / 60;

function gameLoop(timestamp){
  if(lastTime === 0) lastTime = timestamp;
  var delta = (timestamp - lastTime) / 1000; // seconds
  lastTime = timestamp;

  // Cap delta to avoid spiral of death
  if(delta > 0.1) delta = 0.1;

  // Keyboard paddle movement
  if(state === 'playing'){
    var kspd = 8;
    if(keysDown['ArrowLeft'] || keysDown['a'] || keysDown['A']) mouseX -= kspd;
    if(keysDown['ArrowRight'] || keysDown['d'] || keysDown['D']) mouseX += kspd;
    mouseX = Math.max(0, Math.min(CW, mouseX));
  }

  // Fixed timestep update
  accumulator += delta;
  while(accumulator >= TICK){
    update(TICK);
    accumulator -= TICK;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

/* ============ CANVAS RESIZE ============ */
function resizeCanvas() {
  var wrap = document.getElementById('canvasWrap');
  var availW = wrap.clientWidth - 16;
  var availH = wrap.clientHeight - 16;
  var s = Math.min(availW / CW, availH / CH, 1);
  canvas.style.width = Math.floor(CW * s) + 'px';
  canvas.style.height = Math.floor(CH * s) + 'px';
}
window.addEventListener('resize', resizeCanvas);

/* ============ INIT ============ */
buildLevelGrid();
score = 0; lives = 3;
initLevel(1);
state = 'playing';
hideOverlays();
resizeCanvas();
requestAnimationFrame(gameLoop);

})();
</script>
