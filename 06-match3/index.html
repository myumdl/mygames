<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>宝石消消乐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;background-image:linear-gradient(135deg,rgba(26,10,46,0.5),rgba(45,27,105,0.3),rgba(26,10,46,0.5));height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
a{color:#7ec8e3;text-decoration:none;font-size:14px;transition:color .2s}
a:hover{color:#fff}
.top-bar{width:100%;max-width:none;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#16213e;border-bottom:2px solid #0f3460;min-height:48px}
.title{text-align:center;font-size:28px;font-weight:bold;background:linear-gradient(90deg,#f1c40f,#e74c3c,#9b59b6,#3498db,#2ecc71,#e67e22);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding:4px 0;letter-spacing:2px}
.info-bar{width:100%;max-width:520px;display:flex;justify-content:space-around;align-items:center;padding:6px 8px;background:rgba(255,255,255,.05);border-radius:10px;margin:4px auto;font-size:13px;flex-wrap:wrap;gap:2px}
.info-item{text-align:center;padding:2px 8px}
.info-label{color:#aaa;font-size:11px}
.info-value{font-size:18px;font-weight:bold;color:#f1c40f}
.info-value.moves{color:#3498db}
.info-value.level{color:#2ecc71}
#gameCanvas{display:block;margin:6px auto;border-radius:12px;cursor:pointer;touch-action:none}
.btn{padding:12px 32px;border:none;border-radius:25px;font-size:18px;font-weight:bold;cursor:pointer;transition:all .2s;font-family:inherit;color:#fff;letter-spacing:1px}
.btn:hover{transform:scale(1.05)}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.btn-success{background:linear-gradient(135deg,#2ecc71,#27ae60)}
.btn-info{background:linear-gradient(135deg,#3498db,#2980b9)}
.sound-btn{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px;width:36px;height:36px;border-radius:50%;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.sound-btn:hover{border-color:#e91e63}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.overlay-box{background:linear-gradient(135deg,#2d1b69,#1a0a2e);border:2px solid rgba(255,255,255,.2);border-radius:20px;padding:30px 40px;text-align:center;max-width:400px;width:90%}
.overlay-title{font-size:32px;font-weight:bold;margin-bottom:12px}
.overlay-score{font-size:18px;color:#f1c40f;margin:8px 0}
.overlay-buttons{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:320px;margin:16px auto}
.level-btn{width:80px;height:80px;border-radius:15px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:24px;font-weight:bold;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
.level-btn:hover{background:rgba(255,255,255,.15);transform:scale(1.05)}
.level-btn.locked{opacity:.4;cursor:not-allowed}
.level-btn .lvl-target{font-size:10px;color:#aaa;margin-top:2px}
.level-btn.current{border-color:#f1c40f;box-shadow:0 0 15px rgba(241,196,15,.3)}
.hidden{display:none!important}

/* === 常温科技 品牌样式 === */
.cw-brand-bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:rgba(22,33,62,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-top:1px solid rgba(15,52,96,0.5);font-size:11px;color:rgba(255,255,255,0.45);pointer-events:none}
.cw-brand-bar img{width:18px;height:18px;border-radius:50%;opacity:0.6}
.cw-brand-bar span{letter-spacing:0.5px}
.cw-brand-logo-top{width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:4px;flex-shrink:0}
</style>
</head>
<body>
<div class="top-bar">
<a href="../index.html"><img class="cw-brand-logo-top" src="../logo.png" alt="常温"> &larr; 返回大厅</a>
<div class="title">宝石消消乐</div>
<button class="sound-btn" id="soundBtn">&#128266;</button>
</div>
<div class="info-bar" id="infoBar">
<div class="info-item"><div class="info-label">当前分数</div><div class="info-value" id="scoreDisplay">0</div></div>
<div class="info-item"><div class="info-label">目标分数</div><div class="info-value" id="targetDisplay">3000</div></div>
<div class="info-item"><div class="info-label">剩余步数</div><div class="info-value moves" id="movesDisplay">30</div></div>
<div class="info-item"><div class="info-label">当前关卡</div><div class="info-value level" id="levelDisplay">1</div></div>
</div>
<canvas id="gameCanvas"></canvas>
<div class="overlay hidden" id="levelSelectOverlay">
<div class="overlay-box">
<div class="overlay-title" style="font-size:26px">选择关卡</div>
<div class="level-grid" id="levelGrid"></div>
</div>
</div>
<div class="overlay hidden" id="winOverlay">
<div class="overlay-box">
<div class="overlay-title" style="color:#2ecc71">过关!</div>
<div class="overlay-score" id="winScore"></div>
<div class="overlay-buttons">
<button class="btn btn-info" id="winSelBtn">选关</button>
<button class="btn btn-success" id="winNextBtn">下一关 &rarr;</button>
</div>
</div>
</div>
<div class="overlay hidden" id="loseOverlay">
<div class="overlay-box">
<div class="overlay-title" style="color:#e74c3c">未达标</div>
<div class="overlay-score" id="loseScore"></div>
<div class="overlay-buttons">
<button class="btn btn-info" id="loseSelBtn">选关</button>
<button class="btn btn-primary" id="loseRetryBtn">重试</button>
</div>
</div>
</div>
<div class="overlay hidden" id="completeOverlay">
<div class="overlay-box">
<div class="overlay-title" style="background:linear-gradient(90deg,#f1c40f,#e74c3c,#9b59b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:36px">恭喜通关!</div>
<div class="overlay-score" id="completeScore"></div>
<div class="overlay-buttons">
<button class="btn btn-info" id="compSelBtn">选关</button>
</div>
</div>
</div>
<script>
(function(){
"use strict";

/* ===== CONSTANTS ===== */
var ROWS=8,COLS=8,NT=6,CL=56,GR=22,PD=12;
var BW=COLS*CL+PD*2,BH=ROWS*CL+PD*2;
var CW=BW+20,CH=BH+20,BX=(CW-BW)/2,BY=(CH-BH)/2;
var SWT=0.20,RMT=0.30,FLT=0.25;
var LVS=[{t:3000,m:30},{t:6000,m:30},{t:10000,m:30},{t:15000,m:30},{t:25000,m:30}];
var CLR=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22'];
var SPN=0,SPSH=1,SPSV=2,SPRN=3;
var SI='i',SS='s',SSB='b',SRM='r',SFA='f',SSHF='h';

var cv,cx,bd=[],st=SI,sl=null;
var cL=0,sc=0,mv=30,tg=3000,ch=0,hi=0,ul=0;
var sE=true,hT=0,hP=null,hA=0;
var pt=[],cb=[],bm=[];
var aT=0,aD=0,aX=null,rP=0;
var dS=null,dGm=null,iD=false,pT=0;

/* ===== AUDIO ===== */
var acx=null;
function gA(){if(!acx)try{acx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return acx}
function tn(f,ms,t,v){if(!sE)return;var a=gA();if(!a)return;try{var o=a.createOscillator(),g=a.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=v||.12;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+ms/1000);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+ms/1000)}catch(e){}}
function nz(ms,v){if(!sE)return;var a=gA();if(!a)return;try{var b=a.createBuffer(1,a.sampleRate*ms/1000,a.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.5;var s=a.createBufferSource();s.buffer=b;var g=a.createGain();g.gain.value=v||.06;g.gain.exponentialRampToValueAtTime(.001,a.currentTime+ms/1000);var f=a.createBiquadFilter();f.type='highpass';f.frequency.value=2000;s.connect(f);f.connect(g);g.connect(a.destination);s.start();s.stop(a.currentTime+ms/1000)}catch(e){}}
function sSel(){tn(600,30,'sine',.12)}
function sSw(){nz(50,.06)}
function s3(){tn(800,60,'sine',.12)}
function s4(){tn(1000,80,'sine',.15)}
function s5(){tn(800,60,'sine',.1);setTimeout(function(){tn(1000,60,'sine',.1)},60);setTimeout(function(){tn(1200,80,'sine',.12)},120)}
function sC(m){tn(700+m*150,80,'triangle',.15)}
function sB(){tn(200,100,'square',.08)}
function sW(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tn(f,150,'sine',.12)},i*120)})}
document.getElementById('soundBtn').onclick=function(){sE=!sE;this.innerHTML=sE?'&#128266;':'&#128263;'};

/* ===== HELPERS ===== */
function mg(tp,sp){return{type:tp,sp:sp||SPN,ox:0,oy:0,sc:1,al:1,_s:0}}
function rT(){return Math.floor(Math.random()*NT)}
function xy(r,c){return{x:BX+PD+c*CL+CL/2,y:BY+PD+r*CL+CL/2}}
function p2(x,y){var c=Math.floor((x-BX-PD)/CL),r=Math.floor((y-BY-PD)/CL);return(r>=0&&r<ROWS&&c>=0&&c<COLS)?{r:r,c:c}:null}
function sw(r1,c1,r2,c2){var t=bd[r1][c1];bd[r1][c1]=bd[r2][c2];bd[r2][c2]=t}
function wM(r,c,tp){if(c>=2&&bd[r][c-1]&&bd[r][c-2]&&bd[r][c-1].type===tp&&bd[r][c-2].type===tp)return true;if(r>=2&&bd[r-1]&&bd[r-2]&&bd[r-1][c]&&bd[r-2][c]&&bd[r-1][c].type===tp&&bd[r-2][c].type===tp)return true;return false}
function gB(){bd=[];for(var r=0;r<ROWS;r++){bd[r]=[];for(var c=0;c<COLS;c++){var t;do{t=rT()}while(wM(r,c,t));bd[r][c]=mg(t)}}}
function lc(h,n){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgb('+Math.min(255,r+n)+','+Math.min(255,g+n)+','+Math.min(255,b+n)+')'}
function dk(h,n){var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return'rgb('+Math.max(0,r-n)+','+Math.max(0,g-n)+','+Math.max(0,b-n)+')'}

/* ===== MATCH FINDING ===== */
function fM(){
  var mt=[],gs=[];if(!bd.length)return{mt:mt,gs:gs};for(var r=0;r<ROWS;r++){mt[r]=[];for(var c=0;c<COLS;c++)mt[r][c]=false}
  for(var r=0;r<ROWS;r++){var c=0;while(c<COLS){if(!bd[r][c]||bd[r][c].type<0){c++;continue}var tp=bd[r][c].type,e=c+1;while(e<COLS&&bd[r][e]&&bd[r][e].type===tp)e++;if(e-c>=3){var g=[];for(var i=c;i<e;i++){mt[r][i]=true;g.push({r:r,c:i})}gs.push({cells:g,len:e-c,dir:'h'})}c=e}}
  for(var c=0;c<COLS;c++){var r=0;while(r<ROWS){if(!bd[r][c]||bd[r][c].type<0){r++;continue}var tp=bd[r][c].type,e=r+1;while(e<ROWS&&bd[e][c]&&bd[e][c].type===tp)e++;if(e-r>=3){var g=[];for(var i=r;i<e;i++){mt[i][c]=true;g.push({r:i,c:c})}gs.push({cells:g,len:e-r,dir:'v'})}r=e}}
  return{mt:mt,gs:gs}}
function hM(){return fM().gs.length>0}
function fVM(){var mv2=[];if(!bd.length)return mv2;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(c<COLS-1&&bd[r][c]&&bd[r][c+1]){sw(r,c,r,c+1);if(hM())mv2.push([{r:r,c:c},{r:r,c:c+1}]);sw(r,c,r,c+1)}if(r<ROWS-1&&bd[r][c]&&bd[r+1][c]){sw(r,c,r+1,c);if(hM())mv2.push([{r:r,c:c},{r:r+1,c:c}]);sw(r,c,r+1,c)}}return mv2}

/* ===== SPECIAL GEM LOGIC ===== */
function pSp(mt,gs){
  var cr=[];
  for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(!mt[r][c]||!bd[r][c])continue;var gm=bd[r][c];
    if(gm.sp===SPSH){for(var j=0;j<COLS;j++)mt[r][j]=true;bm.push({tp:'r',r:r,c:c,a:1})}
    else if(gm.sp===SPSV){for(var j=0;j<ROWS;j++)mt[j][c]=true;bm.push({tp:'c',r:r,c:c,a:1})}
    else if(gm.sp===SPRN){var tt=-1;for(var gi=0;gi<gs.length&&tt<0;gi++)for(var ci=0;ci<gs[gi].cells.length&&tt<0;ci++){var cc=gs[gi].cells[ci];if((cc.r!==r||cc.c!==c)&&bd[cc.r][cc.c])tt=bd[cc.r][cc.c].type}if(tt<0){var ds=[[-1,0],[1,0],[0,-1],[0,1]];for(var di=0;di<ds.length&&tt<0;di++){var nr=r+ds[di][0],nc=c+ds[di][1];if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&bd[nr][nc]&&!mt[nr][nc])tt=bd[nr][nc].type}}if(tt>=0)for(var j=0;j<ROWS;j++)for(var k=0;k<COLS;k++)if(bd[j][k]&&bd[j][k].type===tt)mt[j][k]=true}}
  for(var gi=0;gi<gs.length;gi++){var g=gs[gi];if(g.len===4){var p=g.cells[1];cr.push({r:p.r,c:p.c,type:bd[p.r][p.c]?bd[p.r][p.c].type:0,sp:g.dir==='h'?SPSV:SPSH})}else if(g.len>=5){var p=g.cells[2];cr.push({r:p.r,c:p.c,type:0,sp:SPRN})}}
  return{mt:mt,cr:cr}}

function rSw(r1,c1,r2,c2){var g1=bd[r1][c1],g2=bd[r2][c2];if(!g1||!g2)return null;var rG,oG,rr,rc;if(g1.sp===SPRN){rG=g1;oG=g2;rr=r1;rc=c1}else if(g2.sp===SPRN){rG=g2;oG=g1;rr=r2;rc=c2}else return null;var tt=oG.type,mt=[];for(var r=0;r<ROWS;r++){mt[r]=[];for(var c=0;c<COLS;c++)mt[r][c]=false}mt[rr][rc]=true;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++)if(bd[r][c]&&bd[r][c].type===tt)mt[r][c]=true;return mt}

/* ===== PARTICLES ===== */
function spP(r,c,tp,n){var cn=xy(r,c),cl=(tp>=0&&tp<CLR.length)?CLR[tp]:'#fff';n=n||8;for(var i=0;i<n;i++){var a=(Math.PI*2/n)*i+Math.random()*.5,sp=60+Math.random()*80;pt.push({x:cn.x,y:cn.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,cl:cl,life:1,sz:2+Math.random()*3})}}
function spCb(t,x,y){cb.push({t:t,x:x,y:y,life:1})}

/* ===== DRAWING ===== */
function rrc(x,y,w,h,rd){cx.moveTo(x+rd,y);cx.lineTo(x+w-rd,y);cx.quadraticCurveTo(x+w,y,x+w,y+rd);cx.lineTo(x+w,y+h-rd);cx.quadraticCurveTo(x+w,y+h,x+w-rd,y+h);cx.lineTo(x+rd,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-rd);cx.lineTo(x,y+rd);cx.quadraticCurveTo(x,y,x+rd,y);cx.closePath()}

function dGm2(px,py,tp,sp,s,al){
  if(tp<0&&sp!==SPRN)return;
  cx.save();cx.globalAlpha=al;cx.translate(px,py);cx.scale(s,s);
  var Rd=GR,col=sp===SPRN?CLR[Math.floor(rP)%NT]:CLR[tp],dt=sp===SPRN?-1:tp;
  cx.fillStyle='rgba(0,0,0,0.25)';cx.beginPath();cx.ellipse(2,3,Rd*.75,Rd*.35,0,0,Math.PI*2);cx.fill();
  cx.beginPath();
  switch(dt){
    case 0:cx.arc(0,0,Rd,0,Math.PI*2);break;
    case 1:cx.moveTo(0,-Rd);cx.lineTo(Rd,0);cx.lineTo(0,Rd);cx.lineTo(-Rd,0);cx.closePath();break;
    case 2:rrc(-Rd*.78,-Rd*.78,Rd*1.56,Rd*1.56,5);break;
    case 3:cx.moveTo(0,-Rd);cx.lineTo(Rd*.95,Rd*.7);cx.lineTo(-Rd*.95,Rd*.7);cx.closePath();break;
    case 4:for(var i=0;i<6;i++){var an=Math.PI/6+(Math.PI*2/6)*i,qx=Math.cos(an)*Rd,qy=Math.sin(an)*Rd;i===0?cx.moveTo(qx,qy):cx.lineTo(qx,qy)}cx.closePath();break;
    case 5:for(var i=0;i<5;i++){var a1=-Math.PI/2+(Math.PI*2/5)*i,a2=a1+Math.PI/5;i===0?cx.moveTo(Math.cos(a1)*Rd,Math.sin(a1)*Rd):cx.lineTo(Math.cos(a1)*Rd,Math.sin(a1)*Rd);cx.lineTo(Math.cos(a2)*Rd*.45,Math.sin(a2)*Rd*.45)}cx.closePath();break;
    default:cx.arc(0,0,Rd,0,Math.PI*2);break;}
  var gr=cx.createRadialGradient(-Rd*.3,-Rd*.3,Rd*.1,0,0,Rd);gr.addColorStop(0,lc(col,60));gr.addColorStop(.5,col);gr.addColorStop(1,dk(col,30));
  cx.fillStyle=gr;cx.fill();cx.strokeStyle=lc(col,30);cx.lineWidth=1.5;cx.stroke();
  cx.beginPath();cx.arc(-Rd*.2,-Rd*.25,Rd*.32,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,0.22)';cx.fill();
  if(sp===SPSH||sp===SPSV){cx.save();cx.beginPath();cx.arc(0,0,Rd-2,0,Math.PI*2);cx.clip();cx.strokeStyle='rgba(255,255,255,0.5)';cx.lineWidth=2;for(var i=-1;i<=1;i++){cx.beginPath();if(sp===SPSH){cx.moveTo(-Rd,i*8);cx.lineTo(Rd,i*8)}else{cx.moveTo(i*8,-Rd);cx.lineTo(i*8,Rd)}cx.stroke()}cx.restore()}
  if(sp===SPRN){cx.save();cx.beginPath();cx.arc(0,0,Rd,0,Math.PI*2);cx.clip();for(var i=0;i<6;i++){var an2=rP*.5+(Math.PI*2/6)*i;cx.beginPath();cx.arc(Math.cos(an2)*Rd*.4,Math.sin(an2)*Rd*.4,Rd*.4,0,Math.PI*2);cx.fillStyle=CLR[i]+'40';cx.fill()}cx.restore();cx.strokeStyle='rgba(255,255,255,'+(0.5+0.3*Math.sin(rP*3))+')';cx.lineWidth=2;cx.beginPath();cx.arc(0,0,Rd,0,Math.PI*2);cx.stroke()}
  cx.restore()}

function drB(){cx.fillStyle='rgba(0,0,0,0.4)';cx.beginPath();rrc(BX,BY,BW,BH,10);cx.fill();for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var px=BX+PD+c*CL,py=BY+PD+r*CL;cx.fillStyle=(r+c)%2===0?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.05)';cx.fillRect(px,py,CL,CL);cx.strokeStyle='rgba(255,255,255,0.06)';cx.lineWidth=.5;cx.strokeRect(px,py,CL,CL)}}
function drG(){if(!bd.length)return;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var g=bd[r][c];if(!g||g.al<=0)continue;var cn=xy(r,c);dGm2(cn.x+(g.ox||0),cn.y+(g.oy||0),g.type,g.sp,g.sc||1,g.al||1)}}
function drS(){if(!sl||st!==SI||!bd.length)return;var cn=xy(sl.r,sl.c),p=.5+.5*Math.sin(performance.now()/150);cx.save();cx.strokeStyle='rgba(255,255,200,'+(0.6+p*.4)+')';cx.lineWidth=3;cx.shadowColor='#f1c40f';cx.shadowBlur=10+p*5;cx.beginPath();cx.arc(cn.x,cn.y,GR+4,0,Math.PI*2);cx.stroke();cx.restore()}
function drH(){if(!hP||st!==SI)return;var p=.3+.4*Math.abs(Math.sin(performance.now()/300));cx.save();cx.globalAlpha=hA*p;for(var i=0;i<hP.length;i++){var cn=xy(hP[i].r,hP[i].c);cx.strokeStyle='#fff';cx.lineWidth=2;cx.shadowColor='#fff';cx.shadowBlur=12;cx.beginPath();cx.arc(cn.x,cn.y,GR+5,0,Math.PI*2);cx.stroke()}cx.restore()}

function stSw(r1,c1,r2,c2,bk){st=bk?SSB:SS;aT=0;aD=SWT;var a=xy(r1,c1),b=xy(r2,c2);aX={r1:r1,c1:c1,r2:r2,c2:c2,dx:b.x-a.x,dy:b.y-a.y};sSw()}

  if(t<.85){e=1-Math.pow(1-t/.85,2.5)}else{var bt=(t-.85)/.15;e=1+Math.sin(bt*Math.PI)*.04*(1-bt)}if(e>1.02)e=1.02;
