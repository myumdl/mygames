<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>涂鸦跳跃</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
#gameContainer{position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:center;background:#1a1a2e}
canvas{display:block;image-rendering:crisp-edges}
#backLink{color:#7ec8e3;text-decoration:none;font-size:14px;padding:4px 10px;border-radius:12px;transition:color 0.2s;z-index:100}
#backLink:hover{color:#a8e6ff}
.top-bar{position:absolute;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(22,33,62,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border-bottom:1px solid rgba(15,52,96,0.5);min-height:44px;transition:opacity 0.3s}
.top-bar.hidden{opacity:0;pointer-events:none}
.game-title{color:#8bc34a;font-size:18px;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.sound-btn{width:36px;height:36px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:18px;color:#e0e0e0;line-height:1}
.sound-btn:hover{border-color:#8bc34a;background:rgba(139,195,74,0.15)}

/* === 常温科技 品牌样式 === */
.cw-brand-bar{position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:8px;padding:4px 12px;background:rgba(22,33,62,0.85);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-top:1px solid rgba(15,52,96,0.5);font-size:11px;color:rgba(255,255,255,0.45);pointer-events:none}
.cw-brand-bar img{width:18px;height:18px;border-radius:50%;opacity:0.6}
.cw-brand-bar span{letter-spacing:0.5px}
.cw-brand-logo-top{width:22px;height:22px;border-radius:50%;vertical-align:middle;margin-right:4px;flex-shrink:0}
</style>
</head>
<body>
<div id="gameContainer">
<div class="top-bar" id="topBar">
  <a id="backLink" href="../index.html"><img class="cw-brand-logo-top" src="../logo.png" alt="常温"> &larr; 返回大厅</a>
  <span class="game-title">🤸 涂鸦跳跃</span>
  <button class="sound-btn" id="soundBtn" title="音效开关">🔊</button>
</div>
<canvas id="gameCanvas"></canvas>
</div>
<script>
(function(){
"use strict";

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');
const backLink = document.getElementById('backLink');

// --- Constants ---
const DESIGN_W = 400;
const DESIGN_H = 600;
const GRAVITY = 0.38;
const JUMP_VY = -9.8;
const SPRING_VY = -24.5;
const FRICTION = 0.85;
const MAX_VX = 8;
const PLAYER_W = 26;
const PLAYER_H = 30;
const PLATFORM_W = 58;
const PLATFORM_H = 12;
const SCROLL_THRESHOLD = 0.4;
const LS_KEY = 'game_doodle_highscore';

// Platform types
const PT_NORMAL = 0;
const PT_MOVING = 1;
const PT_FRAGILE = 2;
const PT_SPRING = 3;

// --- State ---
let W, H, scale;
let state = 'menu'; // menu, playing, paused, gameover
let score = 0;
let maxHeight = 0;
let bestScore = parseInt(localStorage.getItem(LS_KEY)) || 0;
let cameraY = 0;
let player, platforms, particles, clouds, stars;
let keys = {};
let touchSide = 0; // -1 left, 0 none, 1 right
let orientationVX = 0;
let useOrientation = false;
let soundEnabled = true;
let lastMilestone = 0;
let menuBounceTime = 0;
let gameOverTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;

// Audio context
let audioCtx = null;
function ensureAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type){
    if(!soundEnabled || !audioCtx) return;
    try{
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if(type === 'jump'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(600, now + 0.06);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.06);
            osc.start(now);
            osc.stop(now + 0.06);
        } else if(type === 'spring'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(900, now + 0.08);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
        } else if(type === 'break'){
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.05);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.05);
            osc.start(now);
            osc.stop(now + 0.05);
        } else if(type === 'die'){
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.4);
            gain.gain.setValueAtTime(0.18, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        } else if(type === 'milestone'){
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523, now);
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(659, now + 0.1);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.setValueAtTime(0.12, now + 0.1);
            gain2.gain.linearRampToValueAtTime(0, now + 0.3);
            osc2.start(now + 0.1);
            osc2.stop(now + 0.3);
        }
    } catch(e){}
}

// --- Resize ---
function resize(){
    const cw = container.clientWidth;
    const ch = container.clientHeight;
    const ratio = DESIGN_W / DESIGN_H;
    const containerRatio = cw / ch;
    if(containerRatio > ratio){
        H = ch;
        W = Math.round(H * ratio);
    } else {
        W = cw;
        H = Math.round(W / ratio);
    }
    scale = W / DESIGN_W;
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
}
window.addEventListener('resize', resize);
resize();

// --- Helpers ---
function rand(a, b){ return Math.random() * (b - a) + a; }
function randInt(a, b){ return Math.floor(rand(a, b + 1)); }
function lerp(a, b, t){ return a + (b - a) * t; }
function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

// --- Clouds ---
function initClouds(){
    clouds = [];
    for(let i = 0; i < 5; i++){
        clouds.push({
            x: rand(0, DESIGN_W),
            y: rand(0, DESIGN_H * 2),
            w: rand(60, 120),
            h: rand(25, 45),
            speed: rand(0.1, 0.3),
            parallax: rand(0.2, 0.5),
            opacity: rand(0.3, 0.7)
        });
    }
}

function initStars(){
    stars = [];
    for(let i = 0; i < 80; i++){
        stars.push({
            x: rand(0, DESIGN_W),
            yOff: rand(0, 30000),
            size: rand(0.5, 2.5),
            twinkle: rand(0, Math.PI * 2),
            twinkleSpeed: rand(0.02, 0.08)
        });
    }
}

// --- Platform generation ---
function makePlatform(x, y, type){
    const p = {
        x: x,
        y: y,
        w: PLATFORM_W,
        h: PLATFORM_H,
        type: type,
        alive: true,
        moveDir: type === PT_MOVING ? (Math.random() < 0.5 ? 1 : -1) : 0,
        moveSpeed: type === PT_MOVING ? rand(1, 2.5) : 0,
        springCompress: 0,
        breakPieces: null,
        breakTimer: 0
    };
    return p;
}

function getDifficulty(h){
    if(h < 2000) return { maxGap: 60, greenChance: 0.85, moveChance: 0.15, fragileChance: 0, springChance: 0.05 };
    if(h < 5000) return { maxGap: 80, greenChance: 0.60, moveChance: 0.20, fragileChance: 0.05, springChance: 0.08 };
    if(h < 10000) return { maxGap: 100, greenChance: 0.45, moveChance: 0.20, fragileChance: 0.15, springChance: 0.10 };
    return { maxGap: 120, greenChance: 0.30, moveChance: 0.20, fragileChance: 0.25, springChance: 0.10 };
}

function chooseType(h){
    const d = getDifficulty(h);
    const r = Math.random();
    if(r < d.springChance) return PT_SPRING;
    if(r < d.springChance + d.fragileChance) return PT_FRAGILE;
    if(r < d.springChance + d.fragileChance + d.moveChance) return PT_MOVING;
    return PT_NORMAL;
}

function generatePlatforms(fromY, toY){
    const d = getDifficulty(Math.abs(fromY));
    let y = fromY;
    while(y > toY){
        const gap = rand(40, d.maxGap);
        y -= gap;
        const type = chooseType(Math.abs(y));
        const x = rand(5, DESIGN_W - PLATFORM_W - 5);
        platforms.push(makePlatform(x, y, type));
    }
}

// --- Init game ---
function initGame(){
    player = {
        x: DESIGN_W / 2 - PLAYER_W / 2,
        y: DESIGN_H - 80,
        w: PLAYER_W,
        h: PLAYER_H,
        vx: 0,
        vy: 0,
        dir: 1,
        onGround: false,
        legAnim: 0
    };
    platforms = [];
    particles = [];
    cameraY = 0;
    score = 0;
    maxHeight = 0;
    lastMilestone = 0;
    shakeTimer = 0;

    // Generate initial platforms
    // Put a solid platform right under the player
    platforms.push(makePlatform(DESIGN_W / 2 - PLATFORM_W / 2, DESIGN_H - 50, PT_NORMAL));
    // Fill the screen
    let y = DESIGN_H - 50;
    while(y > -DESIGN_H){
        const d = getDifficulty(0);
        const gap = rand(40, d.maxGap);
        y -= gap;
        const x = rand(5, DESIGN_W - PLATFORM_W - 5);
        platforms.push(makePlatform(x, y, y < -200 ? chooseType(Math.abs(y)) : PT_NORMAL));
    }

    initClouds();
    initStars();
}

// --- Particles ---
function spawnBreakParticles(px, py, pw, ph){
    for(let i = 0; i < 4; i++){
        particles.push({
            x: px + (pw / 4) * i + rand(-3, 3),
            y: py + rand(-2, 2),
            vx: rand(-2, 2),
            vy: rand(-3, 0),
            w: pw / 4 - 2,
            h: ph - 2,
            rot: 0,
            rotSpeed: rand(-0.15, 0.15),
            life: 1,
            color: '#8d6e63'
        });
    }
}

function spawnJumpParticles(px, py){
    for(let i = 0; i < 5; i++){
        particles.push({
            x: px + rand(-5, 5),
            y: py + rand(-2, 2),
            vx: rand(-1.5, 1.5),
            vy: rand(-2, -0.5),
            w: rand(2, 4),
            h: rand(2, 4),
            rot: 0,
            rotSpeed: 0,
            life: 1,
            color: 'rgba(255,255,255,0.7)'
        });
    }
}

// --- Update ---
function updateGame(){
    if(state !== 'playing') return;

    // Input
    let inputVX = 0;
    if(keys['ArrowLeft'] || keys['KeyA']) inputVX = -1;
    if(keys['ArrowRight'] || keys['KeyD']) inputVX = 1;
    if(touchSide !== 0) inputVX = touchSide;
    if(useOrientation && inputVX === 0) inputVX = orientationVX / MAX_VX;

    player.vx += inputVX * 0.8;
    player.vx *= FRICTION;
    player.vx = clamp(player.vx, -MAX_VX, MAX_VX);

    if(Math.abs(inputVX) > 0.1){
        player.dir = inputVX > 0 ? 1 : -1;
    }

    // Physics
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Screen wrap
    if(player.x + player.w < 0) player.x = DESIGN_W;
    if(player.x > DESIGN_W) player.x = -player.w;

    // Leg animation
    player.legAnim += 0.15;

    // Platform collision (only when falling)
    if(player.vy > 0){
        for(let i = 0; i < platforms.length; i++){
            const p = platforms[i];
            if(!p.alive) continue;
            // Check collision: player feet overlap platform top
            const playerBottom = player.y + player.h;
            const playerPrevBottom = playerBottom - player.vy;
            if(playerPrevBottom <= p.y + 2 && playerBottom >= p.y && playerBottom <= p.y + p.h + player.vy + 2){
                if(player.x + player.w > p.x + 4 && player.x < p.x + p.w - 4){
                    // Landing!
                    if(p.type === PT_FRAGILE){
                        p.alive = false;
                        spawnBreakParticles(p.x, p.y, p.w, p.h);
                        playSound('break');
                        player.vy = JUMP_VY;
                        player.y = p.y - player.h;
                    } else if(p.type === PT_SPRING){
                        player.vy = SPRING_VY;
                        player.y = p.y - player.h;
                        p.springCompress = 1;
                        playSound('spring');
                    } else {
                        player.vy = JUMP_VY;
                        player.y = p.y - player.h;
                        playSound('jump');
                    }
                    spawnJumpParticles(player.x + player.w / 2, p.y);
                }
            }
        }
    }

    // Update moving platforms
    for(let i = 0; i < platforms.length; i++){
        const p = platforms[i];
        if(p.type === PT_MOVING && p.alive){
            p.x += p.moveSpeed * p.moveDir;
            if(p.x <= 0){ p.x = 0; p.moveDir = 1; }
            if(p.x + p.w >= DESIGN_W){ p.x = DESIGN_W - p.w; p.moveDir = -1; }
        }
        if(p.springCompress > 0){
            p.springCompress -= 0.08;
            if(p.springCompress < 0) p.springCompress = 0;
        }
    }

    // Camera scroll
    const scrollLine = DESIGN_H * SCROLL_THRESHOLD;
    const screenY = player.y - cameraY;
    if(screenY < scrollLine){
        const diff = scrollLine - screenY;
        cameraY -= diff;
    }

    // Score/height
    const height = -cameraY;
    if(height > maxHeight){
        maxHeight = height;
        score = Math.round(maxHeight / 10);
    }

    // Milestone
    const milestoneCheck = Math.floor(maxHeight / 5000);
    if(milestoneCheck > lastMilestone){
        lastMilestone = milestoneCheck;
        playSound('milestone');
    }

    // Generate more platforms above
    let topMostPlatY = Infinity;
    for(let i = 0; i < platforms.length; i++){
        if(platforms[i].y < topMostPlatY) topMostPlatY = platforms[i].y;
    }
    if(topMostPlatY > cameraY - DESIGN_H){
        generatePlatforms(topMostPlatY, cameraY - DESIGN_H * 1.5);
    }

    // Remove platforms far below
    const removeBelow = cameraY + DESIGN_H + 100;
    platforms = platforms.filter(p => p.y < removeBelow);

    // Update particles
    for(let i = particles.length - 1; i >= 0; i--){
        const pt = particles[i];
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.vy += 0.25;
        pt.rot += pt.rotSpeed;
        pt.life -= 0.025;
        if(pt.life <= 0) particles.splice(i, 1);
    }

    // Shake timer
    if(shakeTimer > 0) shakeTimer--;

    // Game over: player fell below screen
    if(player.y - cameraY > DESIGN_H + 50){
        state = 'gameover';
        gameOverTimer = 0;
        document.getElementById('topBar').classList.remove('hidden');
        playSound('die');
        if(score > bestScore){
            bestScore = score;
            localStorage.setItem(LS_KEY, bestScore);
        }
    }
}

// --- Drawing ---
function getBackgroundColors(h){
    if(h < 3000){
        const t = h / 3000;
        return {
            top: lerpColor('#87CEEB', '#FFE0B2', t),
            bottom: lerpColor('#B0E0E6', '#FFCC80', t)
        };
    } else if(h < 8000){
        const t = (h - 3000) / 5000;
        return {
            top: lerpColor('#FFB74D', '#1a237e', t),
            bottom: lerpColor('#FF8A65', '#283593', t)
        };
    } else if(h < 15000){
        const t = (h - 8000) / 7000;
        return {
            top: lerpColor('#1a237e', '#0a0a0a', t),
            bottom: lerpColor('#0d47a1', '#111111', t)
        };
    }
    return { top: '#0a0a0a', bottom: '#111111' };
}

function hexToRGB(hex){
    hex = hex.replace('#', '');
    return {
        r: parseInt(hex.substring(0, 2), 16),
        g: parseInt(hex.substring(2, 4), 16),
        b: parseInt(hex.substring(4, 6), 16)
    };
}

function lerpColor(c1, c2, t){
    const a = hexToRGB(c1), b = hexToRGB(c2);
    const r = Math.round(lerp(a.r, b.r, t));
    const g = Math.round(lerp(a.g, b.g, t));
    const bl = Math.round(lerp(a.b, b.b, t));
    return `rgb(${r},${g},${bl})`;
}

function drawBackground(){
    const h = maxHeight;
    const colors = getBackgroundColors(h);
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, colors.top);
    grad.addColorStop(1, colors.bottom);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
}

function drawClouds(){
    if(maxHeight > 10000) return; // No clouds in space
    const opacity = maxHeight > 6000 ? Math.max(0, 1 - (maxHeight - 6000) / 4000) : 1;
    if(opacity <= 0) return;

    ctx.save();
    ctx.scale(scale, scale);
    ctx.globalAlpha = opacity;
    for(const c of clouds){
        const screenY = (c.y - cameraY * c.parallax) % (DESIGN_H + 100);
        const drawY = screenY < -50 ? screenY + DESIGN_H + 150 : screenY;
        c.x += c.speed;
        if(c.x > DESIGN_W + 60) c.x = -c.w - 10;

        ctx.fillStyle = `rgba(255,255,255,${c.opacity})`;
        ctx.beginPath();
        // Fluffy cloud shape
        const cx = c.x + c.w / 2;
        const cy = drawY + c.h / 2;
        ctx.ellipse(cx, cy, c.w / 2, c.h / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx - c.w * 0.25, cy - c.h * 0.15, c.w * 0.3, c.h * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + c.w * 0.2, cy - c.h * 0.1, c.w * 0.28, c.h * 0.38, 0, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawStars(){
    if(maxHeight < 5000) return;
    const opacity = clamp((maxHeight - 5000) / 3000, 0, 1);
    if(opacity <= 0) return;

    ctx.save();
    ctx.scale(scale, scale);
    ctx.globalAlpha = opacity;
    const time = Date.now() / 1000;
    for(const s of stars){
        const screenY = ((s.yOff - cameraY * 0.05) % (DESIGN_H + 20));
        const drawY = screenY < 0 ? screenY + DESIGN_H + 20 : screenY;
        const twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * s.twinkleSpeed * 10 + s.twinkle));
        ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, drawY, s.size, 0, Math.PI * 2);
        ctx.fill();
    }
    // Distant planets in space
    if(maxHeight > 15000){
        const pOpacity = clamp((maxHeight - 15000) / 5000, 0, 0.6);
        ctx.globalAlpha = pOpacity;
        // A reddish planet
        const py1 = ((5000 - cameraY * 0.03) % (DESIGN_H + 200));
        ctx.fillStyle = '#c0392b';
        ctx.beginPath();
        ctx.arc(320, py1 < 0 ? py1 + DESIGN_H : py1, 18, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.arc(316, (py1 < 0 ? py1 + DESIGN_H : py1) - 4, 6, 0, Math.PI * 2);
        ctx.fill();
        // A blue planet
        const py2 = ((12000 - cameraY * 0.02) % (DESIGN_H + 300));
        ctx.fillStyle = '#2980b9';
        ctx.beginPath();
        ctx.arc(80, py2 < 0 ? py2 + DESIGN_H : py2, 25, 0, Math.PI * 2);
        ctx.fill();
        // Ring
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(80, py2 < 0 ? py2 + DESIGN_H : py2, 38, 8, -0.3, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
}

function drawPlatform(p){
    if(!p.alive) return;
    const sx = p.x;
    const sy = p.y - cameraY;
    if(sy > DESIGN_H + 20 || sy < -40) return;

    ctx.save();

    if(p.type === PT_NORMAL){
        // Green platform with rounded rect
        ctx.fillStyle = '#4caf50';
        roundRect(sx, sy, p.w, p.h, 4);
        ctx.fill();
        // Grass texture on top
        ctx.fillStyle = '#66bb6a';
        roundRect(sx, sy, p.w, 4, 3);
        ctx.fill();
        // Small grass tufts
        ctx.strokeStyle = '#43a047';
        ctx.lineWidth = 1.5;
        for(let i = 0; i < 4; i++){
            const gx = sx + 8 + i * 14;
            ctx.beginPath();
            ctx.moveTo(gx, sy);
            ctx.lineTo(gx - 2, sy - 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(gx + 3, sy);
            ctx.lineTo(gx + 5, sy - 3);
            ctx.stroke();
        }
    } else if(p.type === PT_MOVING){
        // Blue platform
        ctx.fillStyle = '#2196f3';
        roundRect(sx, sy, p.w, p.h, 4);
        ctx.fill();
        ctx.fillStyle = '#42a5f5';
        roundRect(sx, sy, p.w, 4, 3);
        ctx.fill();
        // Direction arrows
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '8px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.moveDir > 0 ? '>>>' : '<<<', sx + p.w / 2, sy + p.h - 2);
    } else if(p.type === PT_FRAGILE){
        // Brown cracked platform
        ctx.fillStyle = '#8d6e63';
        roundRect(sx, sy, p.w, p.h, 3);
        ctx.fill();
        ctx.fillStyle = '#795548';
        roundRect(sx, sy, p.w, 4, 3);
        ctx.fill();
        // Cracks
        ctx.strokeStyle = '#5d4037';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + 15, sy + 2);
        ctx.lineTo(sx + 22, sy + p.h - 2);
        ctx.moveTo(sx + 35, sy + 1);
        ctx.lineTo(sx + 30, sy + p.h - 1);
        ctx.moveTo(sx + 20, sy + p.h / 2);
        ctx.lineTo(sx + 40, sy + p.h / 2 + 1);
        ctx.stroke();
    } else if(p.type === PT_SPRING){
        // Red platform
        ctx.fillStyle = '#f44336';
        roundRect(sx, sy, p.w, p.h, 4);
        ctx.fill();
        ctx.fillStyle = '#ef5350';
        roundRect(sx, sy, p.w, 4, 3);
        ctx.fill();
        // Spring coil on top
        const springH = 10 * (1 - p.springCompress * 0.6);
        const springW = 12;
        const springX = sx + p.w / 2;
        const springY = sy;
        ctx.strokeStyle = '#bdbdbd';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const coils = 4;
        for(let i = 0; i <= coils; i++){
            const t = i / coils;
            const cx = springX + (i % 2 === 0 ? -springW / 2 : springW / 2);
            const cy = springY - springH * t;
            if(i === 0) ctx.moveTo(springX, springY);
            else ctx.lineTo(cx, cy);
        }
        ctx.lineTo(springX, springY - springH);
        ctx.stroke();
        // Spring top cap
        ctx.fillStyle = '#e0e0e0';
        ctx.beginPath();
        ctx.ellipse(springX, springY - springH - 2, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#9e9e9e';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    ctx.restore();
}

function roundRect(x, y, w, h, r){
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

function drawPlayer(px, py, dir, vy){
    const cx = px + PLAYER_W / 2;
    const cy = py + PLAYER_H / 2 - 2;
    const goingUp = vy < 0;
    const legSpread = goingUp ? 6 : 2;
    const legDrop = goingUp ? 6 : 3;

    // Body
    ctx.fillStyle = '#81c784';
    ctx.strokeStyle = '#388e3c';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, cy - 1, 11, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Legs
    ctx.fillStyle = '#81c784';
    ctx.strokeStyle = '#388e3c';
    ctx.lineWidth = 1.5;
    // Left leg
    ctx.beginPath();
    ctx.ellipse(cx - legSpread, cy + 11 + legDrop * 0.3, 4, 5, goingUp ? -0.2 : 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.ellipse(cx + legSpread, cy + 11 + legDrop * 0.3, 4, 5, goingUp ? 0.2 : 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Eyes
    const eyeOffX = dir > 0 ? 2 : -2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(cx - 4 + eyeOffX, cy - 3, 4.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 4 + eyeOffX, cy - 3, 4.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#222';
    const pupilOff = dir > 0 ? 1.5 : -1.5;
    ctx.beginPath();
    ctx.arc(cx - 4 + eyeOffX + pupilOff, cy - 3, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + 4 + eyeOffX + pupilOff, cy - 3, 2, 0, Math.PI * 2);
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    if(goingUp){
        // Happy open mouth
        ctx.arc(cx + eyeOffX * 0.5, cy + 4, 3.5, 0, Math.PI);
    } else {
        // Worried mouth
        ctx.arc(cx + eyeOffX * 0.5, cy + 7, 3, Math.PI, 0);
    }
    ctx.stroke();

    // Nose (tiny dot)
    ctx.fillStyle = '#4caf50';
    ctx.beginPath();
    ctx.arc(cx + eyeOffX + dir * 3, cy, 1.2, 0, Math.PI * 2);
    ctx.fill();
}

function drawParticles(){
    for(const pt of particles){
        const sx = pt.x;
        const sy = pt.y - cameraY;
        if(sy > DESIGN_H + 20 || sy < -20) continue;
        ctx.save();
        ctx.globalAlpha = pt.life;
        ctx.translate(sx + pt.w / 2, sy + pt.h / 2);
        ctx.rotate(pt.rot);
        ctx.fillStyle = pt.color;
        ctx.fillRect(-pt.w / 2, -pt.h / 2, pt.w, pt.h);
        ctx.restore();
    }
}

function drawScore(){
    ctx.save();
    ctx.font = 'bold 22px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(score, 12, 12);
    ctx.fillStyle = '#fff';
    ctx.fillText(score, 10, 10);

    // Height indicator
    ctx.font = '11px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const heightM = (maxHeight / 100).toFixed(1);
    ctx.fillText(heightM + 'm', 10, 36);
    ctx.restore();
}

function drawPauseButton(){
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(DESIGN_W - 24, 24, 16, 0, Math.PI * 2);
    ctx.fill();

    if(state === 'paused'){
        // Play triangle
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(DESIGN_W - 29, 16);
        ctx.lineTo(DESIGN_W - 29, 32);
        ctx.lineTo(DESIGN_W - 16, 24);
        ctx.closePath();
        ctx.fill();
    } else {
        // Pause bars
        ctx.fillStyle = '#fff';
        ctx.fillRect(DESIGN_W - 29, 17, 4, 14);
        ctx.fillRect(DESIGN_W - 22, 17, 4, 14);
    }
    ctx.restore();
}

function drawSoundButton(){
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(DESIGN_W - 60, 24, 14, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(soundEnabled ? '🔊' : '🔇', DESIGN_W - 60, 24);
    ctx.restore();
}

// --- Menu screen ---
function drawMenu(){
    drawBackground();
    drawClouds();

    ctx.save();
    ctx.scale(scale, scale);

    // Animated character on platform
    menuBounceTime += 0.04;
    const bounceY = DESIGN_H * 0.55 + Math.sin(menuBounceTime * 2) * 30;
    const platY = DESIGN_H * 0.55 + 35;

    // Draw a platform
    ctx.fillStyle = '#4caf50';
    roundRect(DESIGN_W / 2 - 35, platY, 70, 14, 5);
    ctx.fill();
    ctx.fillStyle = '#66bb6a';
    roundRect(DESIGN_W / 2 - 35, platY, 70, 5, 4);
    ctx.fill();

    // Draw character
    const charVy = Math.cos(menuBounceTime * 2) * 2;
    drawPlayer(DESIGN_W / 2 - PLAYER_W / 2, bounceY - PLAYER_H, 1, charVy);

    // Title
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title shadow
    ctx.font = 'bold 42px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillText('涂鸦跳跃', DESIGN_W / 2 + 2, 110 + 2);
    ctx.fillStyle = '#fff';
    ctx.fillText('涂鸦跳跃', DESIGN_W / 2, 110);

    // Subtitle / tap to start (blinking)
    const blink = 0.5 + 0.5 * Math.sin(Date.now() / 400);
    ctx.globalAlpha = 0.6 + blink * 0.4;
    ctx.font = '18px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('点击开始', DESIGN_W / 2, DESIGN_H * 0.78);
    ctx.globalAlpha = 1;

    // Best score
    if(bestScore > 0){
        ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.fillText('最高分: ' + bestScore, DESIGN_W / 2, DESIGN_H * 0.85);
    }

    // Controls hint
    ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('← → 方向键 或 A/D 控制方向', DESIGN_W / 2, DESIGN_H * 0.92);

    ctx.restore();
}

function drawPlaying(){
    drawBackground();
    drawStars();
    drawClouds();

    ctx.save();
    ctx.scale(scale, scale);

    // Shake offset
    let shakeX = 0, shakeY = 0;
    if(shakeTimer > 0){
        shakeX = (Math.random() - 0.5) * shakeIntensity;
        shakeY = (Math.random() - 0.5) * shakeIntensity;
        ctx.translate(shakeX, shakeY);
    }

    // Platforms
    for(const p of platforms){
        drawPlatform(p);
    }

    // Particles
    drawParticles();

    // Player
    const playerScreenX = player.x;
    const playerScreenY = player.y - cameraY;
    drawPlayer(playerScreenX, playerScreenY, player.dir, player.vy);

    // Draw wrapped player if near edge
    if(player.x < 0){
        drawPlayer(playerScreenX + DESIGN_W, playerScreenY, player.dir, player.vy);
    } else if(player.x + player.w > DESIGN_W){
        drawPlayer(playerScreenX - DESIGN_W, playerScreenY, player.dir, player.vy);
    }

    // Score
    if(shakeTimer > 0) ctx.translate(-shakeX, -shakeY);
    drawScore();
    drawPauseButton();
    drawSoundButton();

    ctx.restore();
}

function drawPaused(){
    drawPlaying();
    // Overlay
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.scale(scale, scale);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = 'bold 36px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText('暂停', DESIGN_W / 2, DESIGN_H / 2 - 20);
    ctx.font = '16px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('点击继续', DESIGN_W / 2, DESIGN_H / 2 + 25);
    ctx.restore();
}

function drawGameOver(){
    drawBackground();
    drawStars();
    drawClouds();

    ctx.save();
    ctx.scale(scale, scale);

    // Draw platforms
    for(const p of platforms){
        drawPlatform(p);
    }

    ctx.restore();

    // Dark overlay with fade in
    gameOverTimer = Math.min(gameOverTimer + 0.03, 1);
    ctx.fillStyle = `rgba(0,0,0,${gameOverTimer * 0.65})`;
    ctx.fillRect(0, 0, W, H);

    if(gameOverTimer < 0.3) return;

    const alpha = clamp((gameOverTimer - 0.3) / 0.4, 0, 1);
    ctx.save();
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Game over title
    ctx.font = 'bold 38px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#ff5252';
    ctx.fillText('游戏结束', DESIGN_W / 2, DESIGN_H * 0.28);

    // Score
    ctx.font = 'bold 52px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = '#fff';
    ctx.fillText(score, DESIGN_W / 2, DESIGN_H * 0.40);

    ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    const heightM = (maxHeight / 100).toFixed(1);
    ctx.fillText('高度: ' + heightM + 'm', DESIGN_W / 2, DESIGN_H * 0.48);

    // Best score
    if(score >= bestScore){
        ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillStyle = '#ffd740';
        ctx.fillText('新纪录!', DESIGN_W / 2, DESIGN_H * 0.54);
    } else {
        ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fillText('最高分: ' + bestScore, DESIGN_W / 2, DESIGN_H * 0.54);
    }

    // Retry button
    if(gameOverTimer > 0.7){
        const btnAlpha = clamp((gameOverTimer - 0.7) / 0.3, 0, 1);
        ctx.globalAlpha = btnAlpha;
        const btnX = DESIGN_W / 2 - 70;
        const btnY = DESIGN_H * 0.63;
        const btnW = 140;
        const btnH = 44;

        // Button background
        ctx.fillStyle = '#4caf50';
        roundRect(btnX, btnY, btnW, btnH, 22);
        ctx.fill();
        ctx.fillStyle = '#66bb6a';
        roundRect(btnX, btnY, btnW, btnH * 0.5, 22);
        ctx.fill();

        ctx.font = 'bold 18px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillStyle = '#fff';
        ctx.fillText('再来一局', DESIGN_W / 2, btnY + btnH / 2);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
}

// --- Main loop ---
function gameLoop(){
    updateGame();

    // Clear
    ctx.clearRect(0, 0, W, H);

    if(state === 'menu'){
        drawMenu();
    } else if(state === 'playing'){
        drawPlaying();
    } else if(state === 'paused'){
        drawPaused();
    } else if(state === 'gameover'){
        drawGameOver();
    }

    requestAnimationFrame(gameLoop);
}

// --- Input ---
function startGame(){
    ensureAudio();
    initGame();
    state = 'playing';
    document.getElementById('topBar').classList.add('hidden');
}

function handleCanvasClick(cx, cy){
    // cx, cy in design coordinates
    if(state === 'menu'){
        startGame();
        return;
    }
    if(state === 'paused'){
        // Check if clicked play button or anywhere
        state = 'playing';
        return;
    }
    if(state === 'playing'){
        // Pause button area
        if(cx > DESIGN_W - 40 && cy < 40){
            state = 'paused';
            return;
        }
        // Sound button area
        if(cx > DESIGN_W - 76 && cx < DESIGN_W - 44 && cy < 40){
            soundEnabled = !soundEnabled;
            return;
        }
    }
    if(state === 'gameover' && gameOverTimer > 0.7){
        // Retry button
        const btnX = DESIGN_W / 2 - 70;
        const btnY = DESIGN_H * 0.63;
        const btnW = 140;
        const btnH = 44;
        if(cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH){
            startGame();
            return;
        }
    }
}

function getDesignCoords(e){
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    if(e.touches){
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        x: (clientX - rect.left) / scale,
        y: (clientY - rect.top) / scale
    };
}

canvas.addEventListener('click', function(e){
    const c = getDesignCoords(e);
    handleCanvasClick(c.x, c.y);
});

// Touch controls for movement
canvas.addEventListener('touchstart', function(e){
    e.preventDefault();
    if(state === 'menu' || state === 'gameover' || state === 'paused'){
        const c = getDesignCoords(e);
        handleCanvasClick(c.x, c.y);
        return;
    }
    ensureAudio();
    const c = getDesignCoords(e);
    // Check UI buttons first
    if(c.x > DESIGN_W - 40 && c.y < 40){
        state = 'paused';
        return;
    }
    if(c.x > DESIGN_W - 76 && c.x < DESIGN_W - 44 && c.y < 40){
        soundEnabled = !soundEnabled;
        return;
    }
    if(!useOrientation){
        touchSide = c.x < DESIGN_W / 2 ? -1 : 1;
    }
}, {passive: false});

canvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    if(state !== 'playing' || useOrientation) return;
    const c = getDesignCoords(e);
    touchSide = c.x < DESIGN_W / 2 ? -1 : 1;
}, {passive: false});

canvas.addEventListener('touchend', function(e){
    e.preventDefault();
    touchSide = 0;
}, {passive: false});

canvas.addEventListener('touchcancel', function(e){
    touchSide = 0;
});

// Keyboard
document.addEventListener('keydown', function(e){
    keys[e.code] = true;
    if(e.code === 'Space'){
        e.preventDefault();
        if(state === 'menu') startGame();
        else if(state === 'gameover' && gameOverTimer > 0.7) startGame();
        else if(state === 'paused') state = 'playing';
    }
    if(e.code === 'Escape'){
        if(state === 'playing') state = 'paused';
        else if(state === 'paused') state = 'playing';
    }
    if(e.code === 'KeyM'){
        soundEnabled = !soundEnabled;
    }
});

document.addEventListener('keyup', function(e){
    keys[e.code] = false;
});

document.getElementById('soundBtn').addEventListener('click', function(){
    soundEnabled = !soundEnabled;
    this.textContent = soundEnabled ? '🔊' : '🔇';
    if(soundEnabled) ensureAudio();
});

// Window blur auto-pause
window.addEventListener('blur', function(){
    if(state === 'playing') state = 'paused';
});

// Device orientation
function initOrientation(){
    if(typeof DeviceOrientationEvent !== 'undefined'){
        // iOS 13+ needs permission
        if(typeof DeviceOrientationEvent.requestPermission === 'function'){
            // We'll request on first touch
            canvas.addEventListener('touchstart', function reqPerm(){
                DeviceOrientationEvent.requestPermission().then(function(resp){
                    if(resp === 'granted'){
                        window.addEventListener('deviceorientation', handleOrientation);
                        useOrientation = true;
                    }
                }).catch(function(){});
                canvas.removeEventListener('touchstart', reqPerm);
            }, {once: true});
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
            // Check if it actually fires
            let orientFired = false;
            function checkOrient(e){
                if(e.gamma !== null){
                    orientFired = true;
                    useOrientation = true;
                }
                window.removeEventListener('deviceorientation', checkOrient);
            }
            window.addEventListener('deviceorientation', checkOrient);
        }
    }
}

function handleOrientation(e){
    if(e.gamma === null) return;
    const gamma = clamp(e.gamma, -45, 45);
    orientationVX = (gamma / 45) * MAX_VX;
}

initOrientation();

// --- Start ---
initClouds();
initStars();
initGame();
state = 'menu';
gameLoop();

})();
</script>
