<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>五子棋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 16px 0;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  color: #e2b714;
  margin-bottom: 12px;
}
.info {
  font-size: 18px;
  margin-bottom: 12px;
  height: 28px;
  color: #ccc;
}
.info .highlight { color: #e2b714; font-weight: 700; }
canvas {
  border-radius: 8px;
  cursor: pointer;
  touch-action: none;
}
.controls {
  display: flex;
  gap: 12px;
  margin-top: 14px;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  background: #16213e;
  color: #aaa;
  border: none;
  border-radius: 8px;
  padding: 10px 22px;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: #1a2a50; color: #fff; }
.btn.active { background: #e2b714; color: #1a1a2e; font-weight: 700; }
.footer {
  margin-top: 20px;
  font-size: 14px;
}
.footer a {
  color: #e2b714;
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>五子棋</h1>
<div class="info" id="info">黑棋先行 (你执黑)</div>
<canvas id="board"></canvas>
<div class="controls">
  <button class="btn" onclick="game.restart()">新游戏</button>
  <button class="btn" onclick="game.undo()">悔棋</button>
  <button class="btn" id="btnFirst" onclick="game.toggleFirst()">你执: 黑棋</button>
</div>
<div class="footer">
  <a href="../index.html">← 返回大厅</a>
</div>

<script>
const BOARD_SIZE = 15;
const EMPTY = 0, BLACK = 1, WHITE = 2;

// AI evaluation scores
const SCORES = {
  FIVE: 1000000,
  OPEN_FOUR: 100000,
  FOUR: 10000,
  OPEN_THREE: 5000,
  THREE: 1000,
  OPEN_TWO: 500,
  TWO: 100,
  ONE: 10
};

const DIRS = [[1,0],[0,1],[1,1],[1,-1]];

class Gomoku {
  constructor() {
    this.canvas = document.getElementById('board');
    this.ctx = this.canvas.getContext('2d');
    this.playerColor = BLACK;
    this.resize();
    this.bindEvents();
    this.restart();
  }

  resize() {
    const maxW = Math.min(window.innerWidth - 32, 560);
    this.cellSize = Math.floor(maxW / (BOARD_SIZE + 1));
    this.padding = this.cellSize;
    const totalSize = this.cellSize * (BOARD_SIZE - 1) + this.padding * 2;
    this.canvas.width = totalSize;
    this.canvas.height = totalSize;
    if (this.grid) this.draw();
  }

  restart() {
    this.grid = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(EMPTY));
    this.history = [];
    this.gameOver = false;
    this.currentPlayer = BLACK;
    this.winLine = null;
    this.updateInfo();
    this.draw();

    // AI goes first if player chose white
    if (this.playerColor === WHITE) {
      setTimeout(() => this.aiMove(), 200);
    }
  }

  toggleFirst() {
    this.playerColor = this.playerColor === BLACK ? WHITE : BLACK;
    document.getElementById('btnFirst').textContent =
      '你执: ' + (this.playerColor === BLACK ? '黑棋' : '白棋');
    this.restart();
  }

  get aiColor() { return this.playerColor === BLACK ? WHITE : BLACK; }

  updateInfo() {
    const el = document.getElementById('info');
    if (this.gameOver) return;
    const name = this.currentPlayer === this.playerColor ? '你' : 'AI';
    const color = this.currentPlayer === BLACK ? '黑' : '白';
    el.innerHTML = `<span class="highlight">${name}</span> 的回合 (${color}棋)`;
  }

  bindEvents() {
    // click / tap
    const handleClick = (x, y) => {
      if (this.gameOver || this.currentPlayer !== this.playerColor) return;
      const col = Math.round((x - this.padding) / this.cellSize);
      const row = Math.round((y - this.padding) / this.cellSize);
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
      if (this.grid[row][col] !== EMPTY) return;
      this.place(row, col, this.playerColor);
      if (!this.gameOver) {
        setTimeout(() => this.aiMove(), 150);
      }
    };

    this.canvas.addEventListener('click', e => {
      const rect = this.canvas.getBoundingClientRect();
      handleClick(e.clientX - rect.left, e.clientY - rect.top);
    });

    this.canvas.addEventListener('touchend', e => {
      e.preventDefault();
      const rect = this.canvas.getBoundingClientRect();
      const t = e.changedTouches[0];
      handleClick(t.clientX - rect.left, t.clientY - rect.top);
    });

    window.addEventListener('resize', () => this.resize());
  }

  place(row, col, color) {
    this.grid[row][col] = color;
    this.history.push({ row, col, color });
    this.currentPlayer = color === BLACK ? WHITE : BLACK;
    this.draw();

    const win = this.checkWin(row, col, color);
    if (win) {
      this.gameOver = true;
      this.winLine = win;
      this.draw();
      const winner = color === this.playerColor ? '你赢了!' : 'AI 获胜!';
      document.getElementById('info').innerHTML = `<span class="highlight">${winner}</span>`;
      return;
    }
    if (this.history.length === BOARD_SIZE * BOARD_SIZE) {
      this.gameOver = true;
      document.getElementById('info').innerHTML = '<span class="highlight">平局!</span>';
      return;
    }
    this.updateInfo();
  }

  undo() {
    if (this.history.length < 2 || this.gameOver) return;
    // undo AI + player
    for (let i = 0; i < 2; i++) {
      const m = this.history.pop();
      this.grid[m.row][m.col] = EMPTY;
    }
    this.currentPlayer = this.playerColor;
    this.winLine = null;
    this.updateInfo();
    this.draw();
  }

  checkWin(row, col, color) {
    for (const [dr, dc] of DIRS) {
      const line = [[row, col]];
      for (let s of [1, -1]) {
        for (let i = 1; i < 5; i++) {
          const r = row + dr * i * s, c = col + dc * i * s;
          if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
          if (this.grid[r][c] !== color) break;
          line.push([r, c]);
        }
      }
      if (line.length >= 5) return line;
    }
    return null;
  }

  // ========== AI ==========
  aiMove() {
    if (this.gameOver) return;
    const ai = this.aiColor;
    const human = this.playerColor;

    // First move: play center
    if (this.history.length === 0) {
      this.place(7, 7, ai);
      return;
    }
    if (this.history.length === 1) {
      const m = this.history[0];
      // play near the first stone
      const candidates = [[m.row+1, m.col+1],[m.row-1,m.col-1],[m.row+1,m.col-1],[m.row-1,m.col+1]];
      for (const [r,c] of candidates) {
        if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && this.grid[r][c] === EMPTY) {
          this.place(r, c, ai);
          return;
        }
      }
    }

    let bestScore = -Infinity;
    let bestMoves = [];

    // Only evaluate cells near existing stones
    const candidates = this.getCandidates();

    for (const [r, c] of candidates) {
      const attackScore = this.evaluatePoint(r, c, ai);
      const defendScore = this.evaluatePoint(r, c, human);
      // Weight attack slightly more to prefer offense, but defend critical threats
      const score = attackScore * 1.1 + defendScore;

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [[r, c]];
      } else if (score === bestScore) {
        bestMoves.push([r, c]);
      }
    }

    if (bestMoves.length > 0) {
      const [r, c] = bestMoves[Math.floor(Math.random() * bestMoves.length)];
      this.place(r, c, ai);
    }
  }

  getCandidates() {
    const set = new Set();
    const range = 2;
    for (let r = 0; r < BOARD_SIZE; r++)
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (this.grid[r][c] !== EMPTY) {
          for (let dr = -range; dr <= range; dr++)
            for (let dc = -range; dc <= range; dc++) {
              const nr = r + dr, nc = c + dc;
              if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && this.grid[nr][nc] === EMPTY) {
                set.add(nr * BOARD_SIZE + nc);
              }
            }
        }
      }
    return [...set].map(v => [Math.floor(v / BOARD_SIZE), v % BOARD_SIZE]);
  }

  evaluatePoint(row, col, color) {
    // Temporarily place the stone and evaluate
    this.grid[row][col] = color;
    let total = 0;

    for (const [dr, dc] of DIRS) {
      total += this.evaluateLine(row, col, dr, dc, color);
    }

    this.grid[row][col] = EMPTY;
    return total;
  }

  evaluateLine(row, col, dr, dc, color) {
    const opp = color === BLACK ? WHITE : BLACK;
    let count = 1;
    let openEnds = 0;
    let blocked = 0;

    // Scan both directions
    for (const sign of [1, -1]) {
      let hit = 0;
      for (let i = 1; i <= 4; i++) {
        const r = row + dr * i * sign;
        const c = col + dc * i * sign;
        if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) {
          blocked++;
          break;
        }
        if (this.grid[r][c] === color) {
          count++;
          hit++;
        } else if (this.grid[r][c] === EMPTY) {
          openEnds++;
          break;
        } else {
          blocked++;
          break;
        }
      }
    }

    if (count >= 5) return SCORES.FIVE;
    if (blocked >= 2 && openEnds === 0) return 0; // fully blocked

    switch (count) {
      case 4:
        if (openEnds === 2) return SCORES.OPEN_FOUR;
        if (openEnds === 1) return SCORES.FOUR;
        return 0;
      case 3:
        if (openEnds === 2) return SCORES.OPEN_THREE;
        if (openEnds === 1) return SCORES.THREE;
        return 0;
      case 2:
        if (openEnds === 2) return SCORES.OPEN_TWO;
        if (openEnds === 1) return SCORES.TWO;
        return 0;
      case 1:
        if (openEnds === 2) return SCORES.ONE;
        return 0;
      default:
        return 0;
    }
  }

  // ========== Drawing ==========
  draw() {
    const ctx = this.ctx;
    const cs = this.cellSize;
    const pad = this.padding;
    const w = this.canvas.width;
    const h = this.canvas.height;

    // Background
    ctx.fillStyle = '#16213e';
    ctx.fillRect(0, 0, w, h);

    // Board color (wood-like dark)
    ctx.fillStyle = '#1e3050';
    const boardStart = pad - cs * 0.45;
    const boardSize = cs * (BOARD_SIZE - 1) + cs * 0.9;
    ctx.beginPath();
    ctx.roundRect(boardStart, boardStart, boardSize, boardSize, 6);
    ctx.fill();

    // Grid lines
    ctx.strokeStyle = 'rgba(160,180,200,0.35)';
    ctx.lineWidth = 1;
    for (let i = 0; i < BOARD_SIZE; i++) {
      const p = pad + i * cs;
      ctx.beginPath();
      ctx.moveTo(pad, p); ctx.lineTo(pad + (BOARD_SIZE - 1) * cs, p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, pad); ctx.lineTo(p, pad + (BOARD_SIZE - 1) * cs);
      ctx.stroke();
    }

    // Star points
    const stars = [3, 7, 11];
    ctx.fillStyle = 'rgba(160,180,200,0.5)';
    for (const r of stars)
      for (const c of stars) {
        ctx.beginPath();
        ctx.arc(pad + c * cs, pad + r * cs, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }

    // Stones
    const stoneRadius = cs * 0.43;
    for (let r = 0; r < BOARD_SIZE; r++)
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (this.grid[r][c] === EMPTY) continue;
        const x = pad + c * cs, y = pad + r * cs;
        const isBlack = this.grid[r][c] === BLACK;

        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(x + 2, y + 2, stoneRadius, 0, Math.PI * 2);
        ctx.fill();

        // Stone gradient
        const grad = ctx.createRadialGradient(x - stoneRadius * 0.3, y - stoneRadius * 0.3, stoneRadius * 0.1, x, y, stoneRadius);
        if (isBlack) {
          grad.addColorStop(0, '#555');
          grad.addColorStop(1, '#111');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#bbb');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, stoneRadius, 0, Math.PI * 2);
        ctx.fill();
      }

    // Last move marker
    if (this.history.length > 0) {
      const last = this.history[this.history.length - 1];
      const x = pad + last.col * cs, y = pad + last.row * cs;
      ctx.fillStyle = last.color === BLACK ? '#e2b714' : '#e74c3c';
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Win line
    if (this.winLine) {
      ctx.strokeStyle = '#e2b714';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      // sort by position to draw from one end to the other
      const sorted = [...this.winLine].sort((a, b) => a[0] - b[0] || a[1] - b[1]);
      const first = sorted[0], last = sorted[sorted.length - 1];
      ctx.beginPath();
      ctx.moveTo(pad + first[1] * cs, pad + first[0] * cs);
      ctx.lineTo(pad + last[1] * cs, pad + last[0] * cs);
      ctx.stroke();

      // highlight winning stones
      for (const [r, c] of this.winLine) {
        const x = pad + c * cs, y = pad + r * cs;
        ctx.strokeStyle = '#e2b714';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, stoneRadius + 2, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }
}

const game = new Gomoku();
</script>
</body>
</html>
